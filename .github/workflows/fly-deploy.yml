name: Deploy to Fly

on:
  push:
    branches: [prod]
  workflow_dispatch:

jobs:
  changes:
    name: Detect changed workers
    runs-on: ubuntu-latest
    outputs:
      extraction: ${{ steps.filter.outputs.extraction }}
      fix: ${{ steps.filter.outputs.fix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            extraction:
              - 'backend/extraction-worker/**'
            fix:
              - 'backend/fix-worker/**'
              - 'fly.fix-worker.toml'

  deploy-extraction:
    name: Deploy extraction-worker
    needs: changes
    if: needs.changes.outputs.extraction == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-extraction-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        working-directory: backend/extraction-worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-fix:
    name: Deploy fix-worker
    needs: changes
    if: needs.changes.outputs.fix == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-fix-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config fly.fix-worker.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
