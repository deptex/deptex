name: Deploy to Fly

on:
  push:
    branches: [prod]
  workflow_dispatch:

jobs:
  changes:
    name: Detect changed workers
    runs-on: ubuntu-latest
    outputs:
      depscanner: ${{ steps.filter.outputs.depscanner }}
      fix: ${{ steps.filter.outputs.fix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            depscanner:
              - 'depscanner/**'
            fix:
              - 'fix-worker/**'

  deploy-depscanner:
    name: Deploy depscanner
    needs: changes
    if: needs.changes.outputs.depscanner == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-depscanner-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        working-directory: depscanner
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-fix:
    name: Deploy fix-worker
    needs: changes
    if: needs.changes.outputs.fix == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-fix-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        working-directory: fix-worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
