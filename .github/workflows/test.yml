name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Backend's jest config crosses into depscanner/ and fix-worker/ via roots
      # (and via the deptex-depscanner file: dep). Jest follows the file: symlink
      # to each worker's canonical path, so module resolution for transitive deps
      # like web-tree-sitter walks up from depscanner/ — which means depscanner
      # needs its own node_modules populated. Same for fix-worker.
      - name: Install depscanner dependencies
        working-directory: depscanner
        run: npm ci

      - name: Install fix-worker dependencies
        working-directory: fix-worker
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

  depscanner:
    name: Depscanner (preflight + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: depscanner/package-lock.json

      - name: Install depscanner dependencies
        working-directory: depscanner
        run: npm ci

      - name: Type-check
        working-directory: depscanner
        run: npm run type-check

      # 15-stage preflight: invariants, callgraph, propagator, 8 per-language
      # propagator suites, validate, sanitizer-audit, CVE-targeted fixtures,
      # recall scoreboard. Tsx-driven (not jest) because tree-sitter WASM
      # dynamic imports don't survive jest's vm-isolate sandbox without
      # --experimental-vm-modules.
      - name: Run taint-engine preflight
        working-directory: depscanner
        run: npm run test:taint-engine-all

      # Snapshot-runner meta-test: exercises the bootstrap path, diff
      # detection, ignore-list, and arg parser against synthetic dirs.
      # No Docker required — runs in <1s.
      - name: Run snapshot-runner meta-test
        working-directory: depscanner
        run: npm run test:snapshot-runner

  depscanner-fixtures:
    # End-to-end snapshot suite. Builds the Docker image once, then runs
    # `npm run test:fixtures` (default suite only — slow fixtures skipped
    # in CI). On any snapshot diff, the job fails and prints the leaf-path
    # delta so the PR review surface shows what flipped. Contributors
    # regenerate locally with `npm run test:fixtures:update` and commit
    # the snapshot deltas in the same PR.
    name: Depscanner (fixture snapshots)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: depscanner/package-lock.json

      - name: Install depscanner dependencies
        working-directory: depscanner
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build deptex-cli image
        working-directory: depscanner
        run: npm run docker:build

      - name: Run snapshot fixture suite (default — fast fixtures only)
        working-directory: depscanner
        run: npm run test:fixtures

  fix-worker:
    name: Fix-worker (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fix-worker/package-lock.json

      - name: Install fix-worker dependencies
        working-directory: fix-worker
        run: npm ci

      - name: Type-check
        working-directory: fix-worker
        run: npm run type-check

      # Note: fix-worker's jest-style tests (src/__tests__/*.test.ts) are
      # currently picked up by backend's jest via the cross-package roots
      # config — they run in the `backend` job above, not here. If/when
      # fix-worker grows its own jest config, add a step here.
