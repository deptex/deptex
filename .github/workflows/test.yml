name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Backend's jest config crosses into depscanner/ and fix-worker/ via roots
      # (and via the deptex-depscanner file: dep). Jest follows the file: symlink
      # to each worker's canonical path, so module resolution for transitive deps
      # like web-tree-sitter walks up from depscanner/ — which means depscanner
      # needs its own node_modules populated. Same for fix-worker.
      - name: Install depscanner dependencies
        working-directory: depscanner
        run: npm ci

      - name: Install fix-worker dependencies
        working-directory: fix-worker
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test
