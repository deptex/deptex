name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  changes:
    # Emits per-package booleans so downstream jobs can skip work that
    # the PR didn't touch (e.g. a docs-only PR doesn't need to rebuild
    # the depscanner Docker image). Only path-filters PRs: on push to
    # main and workflow_dispatch every job runs unconditionally so
    # post-merge sanity isn't gated on the diff shape.
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      depscanner: ${{ steps.filter.outputs.depscanner }}
      fix-worker: ${{ steps.filter.outputs.fix-worker }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # backend/database/schema.sql is grouped with depscanner because
          # it's the source of truth for PGLite local-mode (depscanner CLI
          # + CI smoke tests). A migration-only PR that refreshes schema.sql
          # should still run the depscanner suite.
          filters: |
            depscanner:
              - 'depscanner/**'
              - 'backend/database/schema.sql'
            fix-worker:
              - 'fix-worker/**'
            workflow:
              - '.github/workflows/test.yml'

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Backend's jest config crosses into depscanner/ and fix-worker/ via roots
      # (and via the deptex-depscanner file: dep). Jest follows the file: symlink
      # to each worker's canonical path, so module resolution for transitive deps
      # like web-tree-sitter walks up from depscanner/ — which means depscanner
      # needs its own node_modules populated. Same for fix-worker. This is why
      # the backend job is NOT path-filtered on depscanner changes: backend's
      # jest still consumes depscanner code on every run, so a backend change
      # that breaks the depscanner module-resolution path needs to fail here.
      - name: Install depscanner dependencies
        working-directory: depscanner
        run: npm ci

      - name: Install fix-worker dependencies
        working-directory: fix-worker
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

  depscanner:
    name: Depscanner (preflight + tsc)
    needs: changes
    # Skip on PRs that don't touch depscanner/** or the workflow file
    # itself. On push to main, workflow_dispatch, or workflow edits the
    # condition collapses to true so the job runs.
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.depscanner == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: depscanner/package-lock.json

      - name: Install depscanner dependencies
        working-directory: depscanner
        run: npm ci

      - name: Type-check
        working-directory: depscanner
        run: npm run type-check

      # 23-stage preflight: invariants, callgraph, propagator, 8 per-language
      # propagator suites, the detector suites (const-resolver, regex-literal,
      # insecure-default, detector-flows), param-harvest + dast-param-enrich,
      # validate, sanitizer-audit, CVE-targeted fixtures, customer-app, and the
      # recall scoreboard. Tsx-driven (not jest) because tree-sitter WASM
      # dynamic imports don't survive jest's vm-isolate sandbox without
      # --experimental-vm-modules.
      - name: Run taint-engine preflight
        working-directory: depscanner
        run: npm run test:taint-engine-all

      # Snapshot-runner meta-test: exercises the bootstrap path, diff
      # detection, ignore-list, and arg parser against synthetic dirs.
      # No Docker required — runs in <1s.
      - name: Run snapshot-runner meta-test
        working-directory: depscanner
        run: npm run test:snapshot-runner

  depscanner-integration:
    # PGLite integration suites. Each boots an in-memory PGLite, loads
    # backend/database/schema.sql, and exercises the RPCs / migrations / storage
    # adapter end-to-end (finalize, recover, composition, claim fairness, fleet
    # snapshot, stats, security-summary recompute, container-scan cache, tracker
    # links, DAST v2.1b migration, rule-generation step). Pure tsx — no Docker,
    # no network, no API keys — so it slots in alongside the preflight job.
    # `test:integration-pglite` chains the green suites and bails on first
    # failure. Two suites are intentionally NOT included because they assert
    # removed behaviour against the current schema: test:finalize (re-review,
    # dropped in phase62_finalize_container_carryforward_perf) and
    # test:dast-v2-1c-migration-pglite (asset_tier, dropped in
    # phase41_drop_asset_tiers + re-review). Re-add them once their fate is
    # decided.
    name: Depscanner (PGLite integration)
    needs: changes
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.depscanner == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: depscanner/package-lock.json

      - name: Install depscanner dependencies
        working-directory: depscanner
        run: npm ci

      - name: Run PGLite integration suites
        working-directory: depscanner
        run: npm run test:integration-pglite

  depscanner-fixtures:
    # End-to-end snapshot suite. Builds the Docker image once, then runs
    # `npm run test:fixtures` (default suite only — slow fixtures skipped
    # in CI). On any snapshot diff, the job fails and prints the leaf-path
    # delta so the PR review surface shows what flipped. Contributors
    # regenerate locally with `npm run test:fixtures:update` and commit
    # the snapshot deltas in the same PR.
    name: Depscanner (fixture snapshots)
    needs: changes
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.depscanner == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: depscanner/package-lock.json

      - name: Install depscanner dependencies
        working-directory: depscanner
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build deptex-cli image
        working-directory: depscanner
        run: npm run docker:build

      - name: Run snapshot fixture suite (default — fast fixtures only)
        working-directory: depscanner
        run: npm run test:fixtures

  # Note: there is no reachability-corpus job here by design. The corpus check
  # (depscanner/scripts/reachability-corpus.ts, `npm run test:reachability-corpus`)
  # is a local-only developer benchmark — it needs a warm ~38GB dep-scan VDB
  # cache at `~/.deptex/vdb` to complete in reasonable time, and the
  # hand-labelled CVE IDs in reachability-corpus.yaml depend on the GHSA→CVE
  # alias chains that the warm VDB exposes. Ephemeral GHA runners satisfy
  # neither. Tried promoting it to PR-triggered on 2026-05-21 and it
  # failed (4/8 scans timeout/fail, 174 findings matched 0 hand-labels).
  # The gate-evaluator logic IS covered by depscanner/src/__tests__/
  # reachability-gates.test.ts, which runs under the `backend` job's jest
  # (its config `roots` cross into depscanner/src — see the backend job note).
  # Don't add this job back until the VDB caching problem is solved upstream.

  fix-worker:
    name: Fix-worker (tsc)
    needs: changes
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.fix-worker == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fix-worker/package-lock.json

      - name: Install fix-worker dependencies
        working-directory: fix-worker
        run: npm ci

      - name: Type-check
        working-directory: fix-worker
        run: npm run type-check

      # Note: fix-worker's jest-style tests (src/__tests__/*.test.ts) are
      # currently picked up by backend's jest via the cross-package roots
      # config — they run in the `backend` job above, not here. If/when
      # fix-worker grows its own jest config, add a step here.
