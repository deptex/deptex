# fly.toml app configuration for the depscanner Fly app.
#
# Phase 23 widened this worker from "just extraction" to "extraction + DAST +
# future iac/container/malicious-pkg" via a unified scan_jobs.type discriminator.
# The Fly app was migrated from `deptex-extraction-worker` to `deptex-depscanner`
# 2026-04-30 (new 50 GB depscan_vdb volume; secrets re-staged from backend/.env).
# The backend reads FLY_DEPSCANNER_APP || FLY_EXTRACTION_APP — set
# FLY_DEPSCANNER_APP=deptex-depscanner in backend env to route here.
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'deptex-depscanner'
primary_region = 'ewr'

[build]

# dep-scan VDB6 extract is ~47GB (33GB data + 14GB index); we keep it between runs. Need working
# headroom for cache/atom + dep-scan's SQLite journal during a scan, so the volume is 100GB
# (a 50GB volume fills to 100% and dep-scan dies with apsw.FullError). Do not clear /data, only /data/cache.
[mounts]
source = "depscan_vdb"
destination = "/data"
initial_size = "100gb"

[env]
  NODE_ENV = 'production'
  VDB_HOME = '/data'
  DEPSCAN_CACHE_DIR = '/data/cache'

[http_service]
  internal_port = 3000
  force_https = true
  # Worker exits after 60s idle (see depscanner/src/index.ts); we rely on that for
  # scale-to-zero. Fly must not stop the machine based on HTTP traffic (we have none).
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'performance'
  cpus = 8
  memory_mb = 65536
