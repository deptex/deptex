service: deptex-fixture
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogStream
          Resource: "*"

functions:
  hello:
    handler: handler.hello
    events:
      - httpApi:
          path: /hello
          method: get
