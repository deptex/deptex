# Corpus of 50 commonly-seen Dockerfile base images, used to enforce M4
# success criterion 2: the catalog must produce a recommendation for at least
# 35 of them (70% coverage of the real-world long tail). The final ~8 entries
# are images the v1 catalog deliberately does NOT cover — RPM-family bases and
# less-common service images — so the assertion is not tautological.
images:
  - node:20
  - node:20-slim
  - node:20-bullseye
  - node:22
  - node:22-slim
  - node:18
  - node:21
  - python:3.12
  - python:3.12-slim
  - python:3.13
  - python:3.11
  - python:3.11-slim
  - python:3.10-slim
  - python:3.9-slim
  - golang:1.23
  - golang:1.22
  - golang:1.21
  - eclipse-temurin:21
  - openjdk:21
  - amazoncorretto:21
  - eclipse-temurin:17
  - openjdk:17
  - debian:bookworm
  - debian:12
  - debian:bullseye
  - debian:11
  - ubuntu:24.04
  - ubuntu:22.04
  - ubuntu:20.04
  - alpine:3.20
  - alpine:3.19
  - alpine:3.18
  - nginx:latest
  - nginx:stable
  - redis:7
  - redis:6
  - postgres:16
  - postgres:15
  - ruby:3.3
  - ruby:3.2
  - php:8.3
  - php:8.2
  # --- deliberately uncovered by the v1 catalog ---
  - amazonlinux:2
  - rockylinux:9
  - fedora:40
  - oraclelinux:9
  - archlinux:latest
  - mcr.microsoft.com/dotnet/runtime:8.0
  - mysql:8
  - mongo:7
