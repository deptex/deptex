# ============================================================================
# Base-image upgrade catalog (Phase 2, Item J).
#
# Hand-curated map of popular base images to more secure alternatives. Drives
# the base-image advisor: given a Dockerfile FROM line, surface a lower-CVE
# drop-in replacement plus a shell-presence compatibility verdict.
#
# Curation rules:
#   - cve_count is a curated, hand-refreshed snapshot — NOT a live count. The
#     advisor compares it against the project's live finding count.
#   - has_shell drives the shell-presence compat verdict: an image with
#     has_shell=false breaks a Dockerfile whose CMD/ENTRYPOINT needs a shell.
#   - libc_family flags glibc<->musl swaps that can break native modules.
#   - drop_in_score (0-100) is a curated confidence that the swap is drop-in.
#   - provider: chainguard | distroless | dhi | official_slim | wolfi
#
# Tag variants of one major share an alternatives list via a YAML anchor —
# the curated alternative is the hardened image for that major line.
# Phase 2.5 replaces hand-curation with a weekly registry-catalog scrape.
# ============================================================================

families:
  # ----- Node.js -----------------------------------------------------------
  - family: node
    sources:
      - source_image: node:20
        alternatives: &node20
          - image: cgr.dev/chainguard/node:20
            provider: chainguard
            has_shell: false
            libc_family: glibc
            drop_in_score: 85
            cve_count: 0
            notes: "Distroless-style; same /usr/local/bin/node path. No shell — exec-form CMD only."
          - image: gcr.io/distroless/nodejs20-debian12
            provider: distroless
            has_shell: false
            libc_family: glibc
            drop_in_score: 80
            cve_count: 2
            notes: "Google distroless. No shell, no package manager."
          - image: dhi.io/node:20
            provider: dhi
            has_shell: true
            libc_family: glibc
            drop_in_score: 78
            cve_count: 1
            notes: "Docker Hardened Image — keeps a shell for wrapper-script entrypoints."
          - image: node:20-alpine
            provider: official_slim
            has_shell: true
            libc_family: musl
            drop_in_score: 60
            cve_count: 6
            notes: "musl libc — native glibc-only addons may need rebuilding."
      - source_image: node:20-slim
        alternatives: *node20
      - source_image: node:20-bullseye
        alternatives: *node20
      - source_image: node:20-bookworm
        alternatives: *node20
      - source_image: node:22
        alternatives: &node22
          - image: cgr.dev/chainguard/node:22
            provider: chainguard
            has_shell: false
            libc_family: glibc
            drop_in_score: 85
            cve_count: 0
            notes: "Distroless-style; exec-form CMD only."
          - image: gcr.io/distroless/nodejs22-debian12
            provider: distroless
            has_shell: false
            libc_family: glibc
            drop_in_score: 80
            cve_count: 2
            notes: "Google distroless for Node 22."
          - image: node:22-alpine
            provider: official_slim
            has_shell: true
            libc_family: musl
            drop_in_score: 60
            cve_count: 5
            notes: "musl libc — verify native addon compatibility."
      - source_image: node:22-slim
        alternatives: *node22
      - source_image: node:18
        alternatives: &node18
          - image: cgr.dev/chainguard/node:18
            provider: chainguard
            has_shell: false
            libc_family: glibc
            drop_in_score: 80
            cve_count: 0
            notes: "Node 18 is in maintenance — consider bumping to 20 while hardening."
          - image: node:20-slim
            provider: official_slim
            has_shell: true
            libc_family: glibc
            drop_in_score: 70
            cve_count: 9
            notes: "Bump off maintenance-track Node 18 to the active LTS."
      - source_image: node:18-slim
        alternatives: *node18
      - source_image: node:21
        alternatives: *node22

