  # ----- Debian / Ubuntu / Alpine base -------------------------------------
  - family: debian
    sources:
      - source_image: debian:bookworm
        alternatives: &deb
          - image: cgr.dev/chainguard/wolfi-base
            provider: wolfi
            has_shell: true
            libc_family: glibc
            drop_in_score: 70
            cve_count: 0
            notes: "Wolfi is glibc-based and keeps apk + a shell — closest drop-in for a Debian base."
          - image: debian:bookworm-slim
            provider: official_slim
            has_shell: true
            libc_family: glibc
            drop_in_score: 80
            cve_count: 14
            notes: "Official slim — fewer preinstalled packages, same shell."
      - source_image: debian:12
        alternatives: *deb
      - source_image: debian:bullseye
        alternatives: &deb11
          - image: debian:bookworm-slim
            provider: official_slim
            has_shell: true
            libc_family: glibc
            drop_in_score: 75
            cve_count: 14
            notes: "Bullseye -> bookworm is a supported base bump; pairs with the slim variant."
      - source_image: debian:11
        alternatives: *deb11
  - family: ubuntu
    sources:
      - source_image: ubuntu:24.04
        alternatives: &ubu
          - image: cgr.dev/chainguard/wolfi-base
            provider: wolfi
            has_shell: true
            libc_family: glibc
            drop_in_score: 68
            cve_count: 0
            notes: "Wolfi-base — glibc, apk-based, much smaller CVE surface than Ubuntu."
      - source_image: ubuntu:latest
        alternatives: *ubu
      - source_image: ubuntu:22.04
