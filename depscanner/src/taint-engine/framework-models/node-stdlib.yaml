  # ---------- Path traversal ----------
  - pattern: fs.readFile(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: fs.readFile
  - pattern: fs.readFileSync(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: fs.readFileSync
  - pattern: fs.writeFile(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: fs.writeFile
  - pattern: fs.writeFileSync(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: fs.writeFileSync
  - pattern: fs.appendFile(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: fs.appendFile
  - pattern: fs.createReadStream(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: fs.createReadStream
  - pattern: fs.createWriteStream(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: fs.createWriteStream
  - pattern: fs.unlink(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: fs.unlink
  - pattern: fs.unlinkSync(*)
    vuln_class: path_traversal
    argument_indices: [0]
