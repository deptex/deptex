  - pattern: fetch(*)
    vuln_class: ssrf
    argument_indices: [0]
    description: Web fetch
  - pattern: node-fetch(*)
    vuln_class: ssrf
    argument_indices: [0]
    description: node-fetch
  - pattern: http.get(*)
    vuln_class: ssrf
