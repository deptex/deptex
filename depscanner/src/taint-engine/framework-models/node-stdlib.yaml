# Cross-framework Node.js stdlib sinks + sanitizers — shared across every
# framework spec the engine loads.
#
# Convention: this file declares NO sources of its own; sources are
# framework-specific and live in the per-framework yamls. The engine loads
# every yaml and matches sources from any spec against sinks from any spec,
# so a request body identified in fastify.yaml flows just fine through a
# child_process.exec sink declared here.
#
# Vuln class scope: the eleven classes locked in feature-brief decision #3.

framework: node-stdlib
version: "*"

sources: []

sinks:
  # ---------- SQL injection ----------
  - pattern: "*.query(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Generic db.query / pool.query / connection.query
  - pattern: "*.raw(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Knex raw SQL passthrough
  - pattern: "*.execute(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: mysql2 / generic execute()
  - pattern: "*.prepare(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: better-sqlite3 / mysql2 prepare with template
  - pattern: sequelize.query(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: Sequelize raw query
  - pattern: knex.raw(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: Knex raw

  # ---------- SSRF ----------
