  - pattern: pino.info(*)
    vuln_class: log_injection
    argument_indices: [0]
    description: pino.info
  - pattern: pino.error(*)
    vuln_class: log_injection
    argument_indices: [0]
    description: pino.error
  - pattern: pino.warn(*)
    vuln_class: log_injection
    argument_indices: [0]
    description: pino.warn
  - pattern: bunyan.info(*)
    vuln_class: log_injection
    argument_indices: [0]
