sanitizers:
  # ---------- XSS ----------
  - pattern: validator.escape(*)
    vuln_classes: [xss]
    description: validator.escape — HTML entity encoding
  - pattern: DOMPurify.sanitize(*)
    vuln_classes: [xss]
    description: DOMPurify
  - pattern: escape-html(*)
    vuln_classes: [xss]
    description: escape-html package
  - pattern: escapeHtml(*)
    vuln_classes: [xss]
    description: escapeHtml helper
  - pattern: he.encode(*)
    vuln_classes: [xss]
    description: he encode

  # ---------- SQL ----------
  - pattern: mysql.escape(*)
    vuln_classes: [sql_injection]
    description: mysql.escape
  - pattern: mysql.escapeId(*)
    vuln_classes: [sql_injection]
    description: mysql.escapeId
  - pattern: pg.escapeLiteral(*)
    vuln_classes: [sql_injection]
    description: pg.escapeLiteral
  - pattern: pg.escapeIdentifier(*)
    vuln_classes: [sql_injection]
    description: pg.escapeIdentifier
  - pattern: sqlstring.escape(*)
    vuln_classes: [sql_injection]
    description: sqlstring.escape

  # ---------- Path traversal ----------
  - pattern: path.normalize(*)
    vuln_classes: [path_traversal]
    description: path.normalize — collapses ../
  - pattern: path.resolve(*)
    vuln_classes: [path_traversal]
    description: path.resolve — absolute resolution
  - pattern: path.basename(*)
    vuln_classes: [path_traversal]
    description: path.basename — strips directory components

  # ---------- Command injection ----------
  - pattern: shell-quote.quote(*)
    vuln_classes: [command_injection]
    description: shell-quote.quote
  - pattern: shellQuote(*)
    vuln_classes: [command_injection]
    description: shellQuote helper
  - pattern: shell-escape(*)
    vuln_classes: [command_injection]
    description: shell-escape

  # ---------- SSRF / open-redirect ----------
  # Percent-encoding a value before it lands in a URL neutralises it for both
  # SSRF and open-redirect: encodeURIComponent escapes `:`, `/`, `?`, `#`, `@`,
  # so an attacker-controlled segment can no longer break out of the path/query
  # to swap the scheme+host (SSRF) or inject `//evil.com` (open redirect). The
  # dominant real-world shape is `fetch(`${BASE}/${encodeURIComponent(x)}`)` and
  # `res.redirect(`${FRONTEND}/p?m=${encodeURIComponent(x)}`)` — both safe.
  - pattern: encodeURIComponent(*)
    vuln_classes: [ssrf, open_redirect]
    description: encodeURIComponent — percent-encodes URL-structural chars, neutralising SSRF/open-redirect payloads
  - pattern: encodeURI(*)
    vuln_classes: [ssrf, open_redirect]
    description: encodeURI — encodes a full URI; the encoded value can't re-point scheme/host
  - pattern: ssrf-req-filter(*)
    vuln_classes: [ssrf]
    description: ssrf-req-filter
  - pattern: validateUrl(*)
    vuln_classes: [ssrf, open_redirect]
    description: validateUrl helper (allowlist check)
  - pattern: assertSafeUrl(*)
    vuln_classes: [ssrf, open_redirect]
    description: assertSafeUrl helper (allowlist check)
  - pattern: isAllowlistedHost(*)
    vuln_classes: [ssrf, open_redirect]
    description: isAllowlistedHost helper

  # ---------- Prototype pollution ----------
  - pattern: cleanObject(*)
    vuln_classes: [prototype_pollution]
    description: hand-written __proto__-stripping helper
  - pattern: stripProtoKeys(*)
    vuln_classes: [prototype_pollution]
    description: hand-written prototype-pollution sanitizer

  # ---------- Deserialization ----------
  - pattern: validateSchema(*)
    vuln_classes: [deserialization]
    description: schema-validated parse (zod / joi / ajv post-parse check)
  - pattern: ajv.validate(*)
    vuln_classes: [deserialization]
    description: ajv schema validation
  - pattern: schema.parse(*)
    vuln_classes: [deserialization]
    description: zod schema.parse — both validates AND coerces

  # ---------- ReDoS ----------
  - pattern: escapeRegExp(*)
    vuln_classes: [redos]
    description: escape-regexp helper
  - pattern: _.escapeRegExp(*)
    vuln_classes: [redos]
    description: lodash escapeRegExp
  - pattern: lodash.escapeRegExp(*)
    vuln_classes: [redos]
    description: lodash escapeRegExp namespaced

  # ---------- File upload ----------
  - pattern: validateMimeType(*)
    vuln_classes: [file_upload]
    description: validateMimeType helper
  - pattern: whitelistedFilename(*)
    vuln_classes: [file_upload]
    description: whitelistedFilename helper

  # ---------- Log injection ----------
  - pattern: stripNewlines(*)
    vuln_classes: [log_injection]
    description: stripNewlines helper
  - pattern: sanitizeLogString(*)
    vuln_classes: [log_injection]
    description: sanitizeLogString helper

  # ---------- Cross-class strict validators ----------
  - pattern: validator.isURL(*)
    vuln_classes: [ssrf, open_redirect]
    description: validator.isURL — boolean check
  - pattern: validator.isInt(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: validator.isInt — numeric coercion gate
  - pattern: Number.parseInt(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: Number.parseInt — numeric coercion
  - pattern: parseInt(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: parseInt — numeric coercion
