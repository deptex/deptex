    description: fs/promises readFile

  # ---------- Command injection ----------
  - pattern: child_process.exec(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: child_process.exec (shell)
  - pattern: child_process.execSync(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: child_process.execSync (shell)
  - pattern: child_process.spawn(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: child_process.spawn — first arg is the command name
  - pattern: child_process.spawnSync(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: child_process.spawnSync
  - pattern: child_process.execFile(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: child_process.execFile — first arg is the file
  - pattern: cp.exec(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: cp alias for child_process.exec
  - pattern: cp.execSync(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: cp alias for child_process.execSync

  # ---------- Prototype pollution ----------
  # Lodash + generic merge functions where attacker-controlled keys can
  # poison Object.prototype. We model the merge target itself, not the
  # specific __proto__ shape — over-approximates, but the concrete-key
  # filter is M6 territory.
  - pattern: _.merge(*)
    vuln_class: prototype_pollution
    argument_indices: [1]
    description: lodash merge — second arg poisons first
  - pattern: _.mergeWith(*)
    vuln_class: prototype_pollution
    argument_indices: [1]
    description: lodash mergeWith
  - pattern: _.set(*)
    vuln_class: prototype_pollution
    argument_indices: [1]
    description: lodash set with attacker-controlled key path
  - pattern: _.setWith(*)
    vuln_class: prototype_pollution
    argument_indices: [1]
    description: lodash setWith
  - pattern: _.defaultsDeep(*)
    vuln_class: prototype_pollution
    argument_indices: [1]
    description: lodash defaultsDeep
  - pattern: _.assign(*)
    vuln_class: prototype_pollution
    argument_indices: [1]
    description: lodash assign
  - pattern: lodash.merge(*)
    vuln_class: prototype_pollution
    argument_indices: [1]
    description: lodash.merge namespaced
  - pattern: "*.merge(*)"
    vuln_class: prototype_pollution
    argument_indices: [1]
    description: Generic .merge() — high precision in the "obj.merge(req.body)" shape
  - pattern: Object.assign(*)
    vuln_class: prototype_pollution
    argument_indices: [1]
    description: Object.assign with untrusted source

  # ---------- Deserialization ----------
  # NOTE: `JSON.parse(*)` was removed as a deserialization sink. JSON.parse is a
  # pure data parser — it cannot instantiate gadget classes or execute code
  # (unlike node-serialize `unserialize` or js-yaml `yaml.load`); the worst a
  # malicious payload does is throw. Keeping it produced a flood of false
  # positives (e.g. every `JSON.parse(localStorage.getItem(...))` in a frontend),
  # with no real RCE surface. Real deserialization-RCE sinks (unserialize,
  # yaml.load) remain below; prototype-pollution has its own class above.
  # Code injection (eval-family): the runtime interprets tainted input AS
  # source code. Distinct from data deserialization (below).
  - pattern: eval(*)
    vuln_class: code_injection
    argument_indices: [0]
    description: eval — direct RCE
  - pattern: Function(*)
    vuln_class: code_injection
    argument_indices: [0]
    description: Function constructor — eval-equivalent
  - pattern: vm.runInNewContext(*)
    vuln_class: code_injection
    argument_indices: [0]
    description: vm.runInNewContext
  - pattern: vm.runInThisContext(*)
    vuln_class: code_injection
    argument_indices: [0]
    description: vm.runInThisContext
  - pattern: vm.runInContext(*)
    vuln_class: code_injection
    argument_indices: [0]
    description: vm.runInContext
  - pattern: vm.compileFunction(*)
    vuln_class: code_injection
    argument_indices: [0]
    description: vm.compileFunction
  - pattern: serialize.unserialize(*)
    vuln_class: deserialization
    argument_indices: [0]
    description: node-serialize.unserialize — known-RCE
  - pattern: unserialize(*)
    vuln_class: deserialization
    argument_indices: [0]
    description: bare unserialize import
  - pattern: yaml.load(*)
    vuln_class: deserialization
    argument_indices: [0]
    description: js-yaml load (the unsafe variant)

  # ---------- ReDoS ----------
  - pattern: RegExp(*)
    vuln_class: redos
    argument_indices: [0]
    description: RegExp constructor with untrusted pattern
  - pattern: new RegExp(*)
    vuln_class: redos
    argument_indices: [0]
    description: new RegExp with untrusted pattern

  # ---------- File upload ----------
  # M5 model: multer factory functions taking a config object whose
  # filename callback is attacker-controlled. We approximate by flagging
  # any tainted argument to the multer factory; the noise is acceptable
  # given multer is rarely called with truly user-controlled args.
  - pattern: multer.single(*)
    vuln_class: file_upload
    argument_indices: [0]
    description: multer.single — unvalidated field name
  - pattern: multer.array(*)
    vuln_class: file_upload
    argument_indices: [0]
    description: multer.array
  - pattern: multer.fields(*)
    vuln_class: file_upload
    argument_indices: [0]
    description: multer.fields
  - pattern: multer.diskStorage(*)
    vuln_class: file_upload
    argument_indices: [0]
    description: multer.diskStorage with untrusted destination/filename
  - pattern: formidable.IncomingForm(*)
    vuln_class: file_upload
    argument_indices: [0]
    description: formidable IncomingForm with untrusted opts
  - pattern: busboy(*)
    vuln_class: file_upload
    argument_indices: [0]
    description: busboy with untrusted opts

