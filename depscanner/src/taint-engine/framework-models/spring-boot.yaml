# Spring Boot / Spring MVC framework spec — Deptex cross-file taint engine.
#
# Spring-specific sources + framework helpers live here. Generic Java stdlib
# sinks (JDBC, Runtime.exec, file I/O, ObjectInputStream, RegExp) live in
# java-stdlib.yaml — both load together so taint introduced by Spring source
# annotations can flow to a stdlib sink.

framework: spring-boot
language: java
version: "*"

sources:
  # Controller method parameters — handled via the IR lowerer, which emits a
  # synthetic `source` step assigning the parameter from the matching pattern.
  - pattern: "@RequestParam"
    taint_kind: http_input
    description: Spring @RequestParam controller parameter
  - pattern: "@PathVariable"
    taint_kind: http_input
    description: Spring @PathVariable controller parameter
  - pattern: "@RequestBody"
    taint_kind: http_input
    description: Spring @RequestBody controller parameter
  - pattern: "@RequestHeader"
    taint_kind: http_input
    description: Spring @RequestHeader controller parameter
  - pattern: "@CookieValue"
    taint_kind: http_input
    description: Spring @CookieValue controller parameter
  - pattern: "@ModelAttribute"
    taint_kind: http_input
    description: Spring @ModelAttribute controller parameter

  # HttpServletRequest accessors — call-shape sources because they're method
  # invocations, not property reads.
  - pattern: "*.getParameter(*)"
    taint_kind: http_input
    description: HttpServletRequest.getParameter
  - pattern: "*.getParameterValues(*)"
    taint_kind: http_input
    description: HttpServletRequest.getParameterValues
  - pattern: "*.getParameterMap(*)"
    taint_kind: http_input
    description: HttpServletRequest.getParameterMap
  - pattern: "*.getHeader(*)"
    taint_kind: http_input
    description: HttpServletRequest.getHeader
  - pattern: "*.getHeaders(*)"
    taint_kind: http_input
    description: HttpServletRequest.getHeaders
  - pattern: "*.getCookies(*)"
    taint_kind: http_input
    description: HttpServletRequest.getCookies
  - pattern: "*.getInputStream(*)"
    taint_kind: http_input
    description: HttpServletRequest.getInputStream
  - pattern: "*.getReader(*)"
    taint_kind: http_input
    description: HttpServletRequest.getReader
  - pattern: "*.getQueryString(*)"
    taint_kind: http_input
    description: HttpServletRequest.getQueryString
  - pattern: "*.getRequestURI(*)"
    taint_kind: http_input
    description: HttpServletRequest.getRequestURI
  - pattern: "*.getRequestURL(*)"
    taint_kind: http_input
    description: HttpServletRequest.getRequestURL
  - pattern: "*.getRemoteAddr(*)"
    taint_kind: http_input
    description: HttpServletRequest.getRemoteAddr
  - pattern: "*.getRemoteHost(*)"
    taint_kind: http_input
    description: HttpServletRequest.getRemoteHost
  - pattern: "*.getPathInfo(*)"
    taint_kind: http_input
    description: HttpServletRequest.getPathInfo

sinks:
  # XSS via raw HTML response writers.
  - pattern: "*.getWriter(*)"
    vuln_class: xss
    argument_indices: []
    description: HttpServletResponse.getWriter (raw HTML)
  - pattern: "ResponseEntity.ok(*)"
    vuln_class: xss
    argument_indices: [0]
    description: ResponseEntity.ok with potentially unsafe payload
  - pattern: "*.println(*)"
    vuln_class: xss
    argument_indices: [0]
    description: PrintWriter.println — typically used to write raw HTML

  # Open redirect — sendRedirect with attacker-controlled URL.
  - pattern: "*.sendRedirect(*)"
    vuln_class: open_redirect
    argument_indices: [0]
    description: HttpServletResponse.sendRedirect

  # SSRF — Spring's RestTemplate.
  - pattern: "*.getForObject(*)"
    vuln_class: ssrf
    argument_indices: [0]
    description: RestTemplate.getForObject
  - pattern: "*.getForEntity(*)"
    vuln_class: ssrf
    argument_indices: [0]
    description: RestTemplate.getForEntity
  - pattern: "*.postForObject(*)"
    vuln_class: ssrf
    argument_indices: [0]
    description: RestTemplate.postForObject
  - pattern: "*.postForEntity(*)"
    vuln_class: ssrf
    argument_indices: [0]
    description: RestTemplate.postForEntity
  - pattern: "*.exchange(*)"
    vuln_class: ssrf
    argument_indices: [0]
    description: RestTemplate.exchange

  # ---------- SpEL parser + property binding (CVE-2022-22965 Spring4Shell family) ----------
  # The Qwen fixture for Spring4Shell writes
  #   `new BeanWrapperImpl(target).setPropertyValue(key, value)`
  # where `key` carries the attacker's `class.module.classLoader…` payload.
  # Today no spring-boot or java-stdlib YAML matches. Aligned with log4j.yaml's
  # `code_injection` mapping for "runtime evaluates attacker bytes".
  - pattern: "SpelExpressionParser.parseExpression(*)"
    vuln_class: code_injection
    argument_indices: [0]
    description: SpEL parser entry — tainted expression string evaluated as Spring EL (CVE-2022-22965 family)
  - pattern: "*.parseExpression(*)"
    vuln_class: code_injection
    argument_indices: [0]
    description: SpelExpressionParser.parseExpression (instance receiver)
  - pattern: "*.getValue(*)"
    vuln_class: code_injection
    argument_indices: []
    description: Spring Expression.getValue — root-object eval surface
  - pattern: "*.setPropertyValue(*)"
    vuln_class: code_injection
    argument_indices: []
    description: BeanWrapperImpl.setPropertyValue — Spring4Shell path-binding sink (class.module.classLoader…)
  - pattern: "*.setPropertyValues(*)"
    vuln_class: code_injection
    argument_indices: []
    description: BeanWrapperImpl.setPropertyValues — bulk binder, CVE-2022-22965 canonical sink
  - pattern: "*.bind(*)"
    vuln_class: code_injection
    argument_indices: [0]
    description: org.springframework.validation.DataBinder.bind — CVE-2022-22965 entry

sanitizers:
  - pattern: "HtmlUtils.htmlEscape(*)"
    vuln_classes: [xss]
    description: org.springframework.web.util.HtmlUtils.htmlEscape
  - pattern: "*.htmlEscape(*)"
    vuln_classes: [xss]
    description: HtmlUtils.htmlEscape (instance receiver)
  - pattern: "StringEscapeUtils.escapeHtml4(*)"
    vuln_classes: [xss]
    description: Apache Commons StringEscapeUtils.escapeHtml4
  - pattern: "StringEscapeUtils.escapeHtml(*)"
    vuln_classes: [xss]
    description: Apache Commons StringEscapeUtils.escapeHtml
