# Cross-framework Go stdlib + common-library sinks + sanitizers — applied
# alongside per-framework Go specs (gin / echo / fiber / net-http).
#
# Convention: NO sources here. Sources are framework-specific and live in
# their own yamls; this file declares only sinks + sanitizers.

framework: go-stdlib
language: go
version: "*"

sources: []

sinks:
  # ---------- SQL injection ----------
  - pattern: db.Query(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: database/sql DB.Query
  - pattern: db.QueryContext(*)
    vuln_class: sql_injection
    argument_indices: [1]
    description: database/sql DB.QueryContext
  - pattern: db.QueryRow(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: database/sql DB.QueryRow
  - pattern: db.QueryRowContext(*)
    vuln_class: sql_injection
    argument_indices: [1]
    description: database/sql DB.QueryRowContext
  - pattern: db.Exec(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: database/sql DB.Exec
  - pattern: db.ExecContext(*)
    vuln_class: sql_injection
    argument_indices: [1]
    description: database/sql DB.ExecContext
  - pattern: tx.Query(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: database/sql Tx.Query
  - pattern: tx.QueryContext(*)
    vuln_class: sql_injection
    argument_indices: [1]
    description: database/sql Tx.QueryContext
  - pattern: tx.Exec(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: database/sql Tx.Exec
  - pattern: tx.ExecContext(*)
    vuln_class: sql_injection
    argument_indices: [1]
    description: database/sql Tx.ExecContext
  - pattern: stmt.Exec(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: database/sql Stmt.Exec — first arg here is values, but a
      hand-prepared dynamic SQL string lands here too in custom helpers
  # Wildcard receiver for ORM helpers (gorm, sqlx, ent, pgx).
  - pattern: "*.Query(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Generic ORM/db helper Query — gorm/sqlx/pgx/ent
  - pattern: "*.QueryRow(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Generic ORM/db helper QueryRow
  - pattern: "*.Exec(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Generic ORM/db helper Exec
  - pattern: "*.Raw(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: gorm DB.Raw
  - pattern: "*.Where(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: gorm DB.Where — raw SQL fragment
  - pattern: "*.Order(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: gorm DB.Order — raw SQL fragment
  - pattern: pgx.Query(*)
    vuln_class: sql_injection
    argument_indices: [1]
    description: pgx Query
  - pattern: sqlx.Select(*)
    vuln_class: sql_injection
    argument_indices: [1]
    description: sqlx Select

  # ---------- Command injection ----------
  # exec.Command(name, args...) — any tainted arg is bad: name = `bash`,
  # args = the shell payload in `sh -c <payload>`.
  - pattern: exec.Command(*)
    vuln_class: command_injection
    argument_indices: []
    description: os/exec Command — any tainted arg is shell-injectable
  - pattern: exec.CommandContext(*)
    vuln_class: command_injection
    argument_indices: []
    description: os/exec CommandContext — any tainted arg is shell-injectable
  - pattern: exec.LookPath(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: os/exec LookPath — name lookup with user input
  - pattern: syscall.Exec(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: syscall.Exec
  - pattern: syscall.ForkExec(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: syscall.ForkExec

  # ---------- Path traversal ----------
  - pattern: os.Open(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: os.Open
  - pattern: os.OpenFile(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: os.OpenFile
  - pattern: os.Create(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: os.Create
  - pattern: os.ReadFile(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: os.ReadFile
  - pattern: os.WriteFile(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: os.WriteFile
  - pattern: os.Remove(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: os.Remove
  - pattern: os.RemoveAll(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: os.RemoveAll
  - pattern: os.Mkdir(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: os.Mkdir
  - pattern: os.MkdirAll(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: os.MkdirAll
  - pattern: ioutil.ReadFile(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: ioutil.ReadFile (deprecated alias)
  - pattern: ioutil.WriteFile(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: ioutil.WriteFile (deprecated alias)
  - pattern: filepath.Walk(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: filepath.Walk root path

  # ---------- SSRF ----------
  - pattern: http.Get(*)
    vuln_class: ssrf
    argument_indices: [0]
    description: net/http Get
  - pattern: http.Post(*)
    vuln_class: ssrf
    argument_indices: [0]
    description: net/http Post
  - pattern: http.PostForm(*)
    vuln_class: ssrf
    argument_indices: [0]
    description: net/http PostForm
  - pattern: http.Head(*)
    vuln_class: ssrf
    argument_indices: [0]
    description: net/http Head
  - pattern: http.NewRequest(*)
    vuln_class: ssrf
    argument_indices: [1]
    description: net/http NewRequest URL
  - pattern: http.NewRequestWithContext(*)
    vuln_class: ssrf
    argument_indices: [2]
    description: net/http NewRequestWithContext URL
  - pattern: client.Get(*)
    vuln_class: ssrf
    argument_indices: [0]
    description: http.Client Get
  - pattern: client.Post(*)
    vuln_class: ssrf
    argument_indices: [0]
    description: http.Client Post
  - pattern: client.Do(*)
    vuln_class: ssrf
    argument_indices: [0]
    description: http.Client Do — request URL inside is tainted
  - pattern: url.Parse(*)
    vuln_class: ssrf
    argument_indices: [0]
    description: net/url Parse with user URL

  # ---------- XSS ----------
  # html/template auto-escapes; the bypass is template.HTML(rawString)
  # which marks bytes as already-safe HTML. We model that as a sink so a
  # tainted string flowing into the type cast surfaces.
  - pattern: template.HTML(*)
    vuln_class: xss
    argument_indices: [0]
    description: html/template HTML cast — bypasses auto-escape
  - pattern: template.JS(*)
    vuln_class: xss
    argument_indices: [0]
    description: html/template JS cast — bypasses JS escape
  - pattern: template.URL(*)
    vuln_class: xss
    argument_indices: [0]
    description: html/template URL cast — bypasses URL sanitization
  - pattern: template.HTMLAttr(*)
    vuln_class: xss
    argument_indices: [0]
    description: html/template HTMLAttr cast — bypasses attr escape
  - pattern: template.CSS(*)
    vuln_class: xss
    argument_indices: [0]
    description: html/template CSS cast — bypasses CSS escape

  # ---------- golang.org/x/net/html rendering (CVE-2023-3978) ----------
  # `html.Render(w, n)` writes a parsed HTML tree directly without
  # re-escaping attribute values. When `n` was built from attacker-
  # controlled bytes (e.g. via `html.Parse` on user input) any attribute
  # injection inside the tree round-trips to the response body. The fix
  # is escaping at parse-time; pre-fix the Render call IS the sink.
  - pattern: html.Render(*)
    vuln_class: xss
    argument_indices: [1]
    description: golang.org/x/net/html Render — emits tree without attr re-escape (CVE-2023-3978)

  # ---------- Open redirect ----------
  - pattern: http.Redirect(*)
    vuln_class: open_redirect
    argument_indices: [2]
    description: net/http Redirect URL
  - pattern: http.RedirectHandler(*)
    vuln_class: open_redirect
    argument_indices: [0]
    description: net/http RedirectHandler

  # ---------- Deserialization ----------
  - pattern: yaml.Unmarshal(*)
    vuln_class: deserialization
    argument_indices: [0]
    description: gopkg.in/yaml Unmarshal
  - pattern: gob.NewDecoder(*)
    vuln_class: deserialization
    argument_indices: [0]
    description: encoding/gob NewDecoder — gob can be RCE-shaped

  # ---------- ReDoS ----------
  - pattern: regexp.Compile(*)
    vuln_class: redos
    argument_indices: [0]
    description: regexp.Compile with untrusted pattern
  - pattern: regexp.MustCompile(*)
    vuln_class: redos
    argument_indices: [0]
    description: regexp.MustCompile with untrusted pattern
  - pattern: regexp.CompilePOSIX(*)
    vuln_class: redos
    argument_indices: [0]
    description: regexp.CompilePOSIX

  # ---------- Log injection ----------
  - pattern: log.Print(*)
    vuln_class: log_injection
    argument_indices: [0]
    description: log.Print
  - pattern: log.Printf(*)
    vuln_class: log_injection
    argument_indices: [1]
    description: log.Printf — 2nd+ args are interpolated
  - pattern: log.Println(*)
    vuln_class: log_injection
    argument_indices: [0]
    description: log.Println
  - pattern: log.Fatal(*)
    vuln_class: log_injection
    argument_indices: [0]
    description: log.Fatal
  - pattern: log.Fatalf(*)
    vuln_class: log_injection
    argument_indices: [1]
    description: log.Fatalf
  - pattern: log.Panic(*)
    vuln_class: log_injection
    argument_indices: [0]
    description: log.Panic

sanitizers:
  # ---------- XSS ----------
  - pattern: template.HTMLEscapeString(*)
    vuln_classes: [xss]
    description: html/template HTMLEscapeString
  - pattern: template.JSEscapeString(*)
    vuln_classes: [xss]
    description: html/template JSEscapeString
  - pattern: template.URLQueryEscaper(*)
    vuln_classes: [xss]
    description: html/template URLQueryEscaper
  - pattern: html.EscapeString(*)
    vuln_classes: [xss]
    description: html EscapeString

  # ---------- SQL ----------
  # Driver-side parametrized queries are the right answer; there isn't a
  # standard "escape this for SQL" stdlib helper. Hand-rolled validators
  # land here.
  - pattern: pq.QuoteIdentifier(*)
    vuln_classes: [sql_injection]
    description: lib/pq QuoteIdentifier

  # ---------- Path traversal ----------
  - pattern: filepath.Clean(*)
    vuln_classes: [path_traversal]
    description: filepath.Clean — collapses ../
  - pattern: filepath.Base(*)
    vuln_classes: [path_traversal]
    description: filepath.Base — strips directory
  - pattern: path.Clean(*)
    vuln_classes: [path_traversal]
    description: path.Clean
  - pattern: path.Base(*)
    vuln_classes: [path_traversal]
    description: path.Base

  # ---------- Command injection ----------
  - pattern: shellquote.Join(*)
    vuln_classes: [command_injection]
    description: shellquote.Join

  # ---------- SSRF / open redirect ----------
  - pattern: validateUrl(*)
    vuln_classes: [ssrf, open_redirect]
    description: hand-written URL allowlist check
  - pattern: assertSafeUrl(*)
    vuln_classes: [ssrf, open_redirect]
    description: hand-written URL allowlist check
  - pattern: isAllowedHost(*)
    vuln_classes: [ssrf, open_redirect]
    description: hand-written host allowlist

  # ---------- ReDoS ----------
  - pattern: regexp.QuoteMeta(*)
    vuln_classes: [redos]
    description: regexp.QuoteMeta — escape regex metachars

  # ---------- Numeric coercion (cross-class) ----------
  - pattern: strconv.Atoi(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: strconv.Atoi — numeric coercion
  - pattern: strconv.ParseInt(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: strconv.ParseInt
  - pattern: strconv.ParseUint(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: strconv.ParseUint
  - pattern: strconv.ParseFloat(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: strconv.ParseFloat

  # ---------- Log injection ----------
  - pattern: stripNewlines(*)
    vuln_classes: [log_injection]
    description: hand-written newline stripper
