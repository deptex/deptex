  # ---------- ReDoS ----------
  - pattern: Regexp.new(*)
    vuln_class: redos
    argument_indices: [0]
    description: Regexp.new with untrusted pattern
  - pattern: Regexp.compile(*)
    vuln_class: redos
    argument_indices: [0]
    description: Regexp.compile
  - pattern: Rack.MediaType.type(*)
    vuln_class: redos
    argument_indices: [0]
    description: Rack::MediaType.type — CVE-2024-25126 catastrophic backtracking
  - pattern: Rack.Utils.parse_query(*)
    vuln_class: redos
    argument_indices: [0]
    description: Rack::Utils.parse_query — historical ReDoS family

  # ---------- ActiveSupport SafeBuffer mutation (CVE-2023-28120) ----------
  # The activesupport bytesplice CVE: SafeBuffer#bytesplice mutates the
  # underlying string past the html_safe flag check, so tainted bytes land
  # inside an otherwise-safe HTML string. AI rule generation routinely emits
  # patterns shaped `*.bytesplice(*)` which the schema accepts because
  # `bytesplice` is a rare method name (low FP risk).
  - pattern: "*.bytesplice(*)"
    vuln_class: xss
    argument_indices: [1]
    description: ActiveSupport::SafeBuffer#bytesplice — mutates buffer past the safe-flag check (CVE-2023-28120)
  - pattern: "*.replace(*)"
    vuln_class: xss
    argument_indices: [0]
    description: SafeBuffer#replace — mutation that drops the html_safe flag

  # ---------- git gem command injection (CVE-2024-32465) ----------
  - pattern: Git.clone(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: ruby-git Git.clone — repo URL routed into argv-less git clone (CVE-2024-32465)
  - pattern: Git.ls_remote(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: ruby-git Git.ls_remote — URL routed into git ls-remote

sanitizers:
  # ---------- SQL ----------
  - pattern: ActiveRecord.Base.sanitize_sql(*)
    vuln_classes: [sql_injection]
    description: ActiveRecord::Base.sanitize_sql
  - pattern: sanitize_sql(*)
    vuln_classes: [sql_injection]
    description: bare sanitize_sql
  - pattern: sanitize_sql_array(*)
    vuln_classes: [sql_injection]
    description: sanitize_sql_array
  - pattern: connection.quote(*)
    vuln_classes: [sql_injection]
    description: ActiveRecord connection.quote
  - pattern: ActiveRecord.Base.connection.quote(*)
    vuln_classes: [sql_injection]
    description: ActiveRecord::Base.connection.quote (qualified)

  # ---------- XSS ----------
  - pattern: ERB.Util.html_escape(*)
    vuln_classes: [xss]
    description: ERB::Util.html_escape
  - pattern: html_escape(*)
    vuln_classes: [xss]
    description: html_escape helper
  - pattern: h(*)
    vuln_classes: [xss]
    description: Rails h() escape helper
  - pattern: CGI.escapeHTML(*)
    vuln_classes: [xss]
    description: CGI.escapeHTML
  - pattern: ERB.Util.h(*)
    vuln_classes: [xss]
    description: ERB::Util.h

  # ---------- Open redirect / SSRF ----------
  - pattern: CGI.escape(*)
    vuln_classes: [xss, open_redirect]
    description: CGI.escape
  - pattern: URI.encode_www_form_component(*)
    vuln_classes: [xss, open_redirect]
    description: URI.encode_www_form_component
  - pattern: URI.parse(*)
    vuln_classes: [ssrf]
    description: URI.parse — best-effort URL validation
  - pattern: URI.regexp(*)
    vuln_classes: [ssrf, open_redirect]
    description: URI.regexp pattern check

  # ---------- Command injection ----------
  - pattern: Shellwords.escape(*)
    vuln_classes: [command_injection]
    description: Shellwords.escape
  - pattern: Shellwords.split(*)
    vuln_classes: [command_injection]
    description: Shellwords.split
  - pattern: shellescape(*)
    vuln_classes: [command_injection]
    description: String#shellescape (alias)

  # ---------- Path traversal ----------
  - pattern: File.basename(*)
    vuln_classes: [path_traversal]
    description: File.basename — strips directory
  - pattern: File.expand_path(*)
    vuln_classes: [path_traversal]
    description: File.expand_path with explicit base dir
  - pattern: Pathname.new(*).cleanpath
    vuln_classes: [path_traversal]
    description: Pathname#cleanpath

  # ---------- Cross-class numeric coercion ----------
  - pattern: Integer(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: Integer() coercion
  - pattern: Float(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: Float() coercion
  - pattern: to_i
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: String#to_i
  - pattern: "*.to_i"
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: String#to_i (receiver form)

  # ---------- Deserialization ----------
  - pattern: YAML.safe_load(*)
    vuln_classes: [deserialization]
    description: YAML.safe_load
  - pattern: Psych.safe_load(*)
    vuln_classes: [deserialization]
    description: Psych.safe_load
  - pattern: JSON.parse(*)
    vuln_classes: [deserialization]
    description: JSON.parse — well-defined data-only deserializer

  # ---------- ReDoS ----------
  - pattern: Regexp.escape(*)
    vuln_classes: [redos]
    description: Regexp.escape
