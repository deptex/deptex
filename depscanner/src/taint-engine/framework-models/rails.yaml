  # ---------- XSS ----------
  - pattern: raw(*)
    vuln_class: xss
    argument_indices: [0]
    description: Rails raw — bypasses escape
  - pattern: html_safe
    vuln_class: xss
    argument_indices: []
    description: Rails String#html_safe — bypasses escape
  - pattern: "*.html_safe"
    vuln_class: xss
    argument_indices: []
    description: Rails String#html_safe (receiver form)
  - pattern: render(*)
    vuln_class: xss
    argument_indices: [0]
