# Rails framework spec — Deptex cross-file taint engine.
#
# Rails exposes request data through controller `params`, `request`,
# `cookies`, and `session`. Sources cover those plus common request-object
# accessors. Sinks cover SQL injection (raw `where` / `find_by_sql` /
# ActiveRecord::Base.connection.execute), command injection (system / exec
# / Open3 / IO.popen), path traversal (File.open / send_file / Pathname),
# SSRF (Net::HTTP / URI.open / HTTParty / Faraday), XSS (raw / html_safe /
# render html:), open redirect (redirect_to), deserialization (Marshal /
# YAML.load), log injection (Rails.logger.*), and ReDoS (Regexp.new).
#
# Generic Ruby-stdlib sinks are duplicated across the rails + sinatra
# framework yamls so a workspace using only one of them still detects
# stdlib-targeting flows.

framework: rails
language: ruby
version: "*"

sources:
  # Controller params
  - pattern: params.*
    taint_kind: http_input
    description: Rails controller params accessor
  - pattern: params[*]
    taint_kind: http_input
    description: Rails controller params subscript
  - pattern: params
    taint_kind: http_input
    description: bare params reference
  - pattern: request.params.*
    taint_kind: http_input
    description: Rails request.params accessor
  - pattern: request.params
    taint_kind: http_input
    description: Rails request.params
  - pattern: request.headers.*
    taint_kind: http_input
    description: Rails request.headers
  - pattern: request.headers
    taint_kind: http_input
    description: bare request.headers
  - pattern: request.body.read
    taint_kind: http_input
    description: Rails request.body.read
  - pattern: request.body
    taint_kind: http_input
    description: Rails request.body
  - pattern: request.GET.*
    taint_kind: http_input
    description: Rails request.GET (Rack)
  - pattern: request.POST.*
    taint_kind: http_input
    description: Rails request.POST (Rack)
  - pattern: request.query_parameters.*
    taint_kind: http_input
    description: Rails request.query_parameters
  - pattern: request.request_parameters.*
    taint_kind: http_input
    description: Rails request.request_parameters
  - pattern: request.path_parameters.*
    taint_kind: http_input
    description: Rails request.path_parameters
  - pattern: request.url
    taint_kind: http_input
    description: Rails request.url
  - pattern: request.original_url
    taint_kind: http_input
    description: Rails request.original_url
  - pattern: request.fullpath
    taint_kind: http_input
    description: Rails request.fullpath
  - pattern: request.host
    taint_kind: http_input
    description: Rails request.host
  - pattern: request.referer
    taint_kind: http_input
    description: Rails request.referer
  - pattern: request.user_agent
    taint_kind: http_input
    description: Rails request.user_agent
  - pattern: request.remote_ip
    taint_kind: http_input
    description: Rails request.remote_ip
  - pattern: request.env.*
    taint_kind: http_input
    description: Rails request.env (Rack env)
  - pattern: cookies.*
    taint_kind: http_input
    description: Rails cookies accessor
  - pattern: cookies[*]
    taint_kind: http_input
    description: Rails cookies subscript
  - pattern: session.*
    taint_kind: http_input
    description: Rails session accessor
  - pattern: session[*]
    taint_kind: http_input
    description: Rails session subscript

  # Call-shape sources
  - pattern: params.require(*)
    taint_kind: http_input
    description: params.require()
  - pattern: params.permit(*)
    taint_kind: http_input
    description: params.permit()
  - pattern: params.fetch(*)
    taint_kind: http_input
    description: params.fetch()
  - pattern: params.dig(*)
    taint_kind: http_input
    description: params.dig()
  - pattern: request.headers.fetch(*)
    taint_kind: http_input
    description: request.headers.fetch()

  # ---------- Rack middleware sources ----------
  # Mirrors the Rack additions in sinatra.yaml. Rails mounts Rack
  # middleware ahead of ActionDispatch (Rack::Request.new(env),
  # Rack::Utils.parse_query). Sidekiq Web, ActionDispatch's executor
  # tests, and rack-attack-style fixtures all enter taint via Rack rather
  # than `params[...]`. Without these the engine misses any handler that
  # reads the Rack env via the documented wrapper API.
  - pattern: Rack.Request.new(*)
    taint_kind: http_input
    description: Rack::Request.new(env) — wraps tainted Rack environment
  - pattern: Rack.Utils.parse_query(*)
    taint_kind: http_input
    description: Rack::Utils.parse_query — parses tainted query string
  - pattern: Rack.Utils.parse_nested_query(*)
    taint_kind: http_input
    description: Rack::Utils.parse_nested_query
  - pattern: Rack.Utils.parse_cookies(*)
    taint_kind: http_input
    description: Rack::Utils.parse_cookies
  - pattern: Rack.MediaType.params(*)
    taint_kind: http_input
    description: Rack::MediaType.params — parses tainted Content-Type
  - pattern: "*.get_header(*)"
    taint_kind: http_input
    description: Rack::Request#get_header (and ActionDispatch::Request#get_header)
  - pattern: "*.fetch_header(*)"
    taint_kind: http_input
    description: Rack::Request#fetch_header

sinks:
