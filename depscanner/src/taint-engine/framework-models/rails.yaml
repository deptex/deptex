  - pattern: ActiveRecord.Base.connection.execute(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: ActiveRecord::Base.connection.execute
  - pattern: connection.execute(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: ActiveRecord connection.execute
  - pattern: connection.exec_query(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: ActiveRecord connection.exec_query
  - pattern: ActiveRecord.Base.connection.exec_query(*)
    vuln_class: sql_injection
