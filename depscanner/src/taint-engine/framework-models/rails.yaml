    vuln_class: sql_injection
    argument_indices: [0]
    description: ActiveRecord where with raw SQL string
  - pattern: "*.find_by_sql(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: ActiveRecord find_by_sql
  - pattern: "*.find_by_statement(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: ActiveRecord find_by_statement
  - pattern: "*.exists?(*)"
