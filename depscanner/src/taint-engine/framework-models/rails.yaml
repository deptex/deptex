    description: ActiveRecord order with raw SQL fragment
  - pattern: "*.group(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: ActiveRecord group with raw SQL fragment
  - pattern: "*.having(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: ActiveRecord having with raw SQL fragment
  - pattern: "*.joins(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: ActiveRecord joins with raw SQL fragment
  - pattern: "*.select(*)"
    vuln_class: sql_injection
    argument_indices: [0]
