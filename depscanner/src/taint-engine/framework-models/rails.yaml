  # ---------- Command injection ----------
  - pattern: system(*)
    vuln_class: command_injection
    argument_indices: []
    description: Kernel#system — any tainted arg is shell-injectable
  - pattern: exec(*)
    vuln_class: command_injection
    argument_indices: []
    description: Kernel#exec — any tainted arg is shell-injectable
  - pattern: Kernel.system(*)
    vuln_class: command_injection
    argument_indices: []
    description: Kernel.system (qualified)
  - pattern: Kernel.exec(*)
    vuln_class: command_injection
    argument_indices: []
    description: Kernel.exec (qualified)
  - pattern: "`(*)"
    vuln_class: command_injection
    argument_indices: [0]
    description: Backtick command — `cmd`
  - pattern: Kernel.`(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: Kernel.` — backtick command
  - pattern: Process.spawn(*)
    vuln_class: command_injection
