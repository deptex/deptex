# jsrsasign framework spec — Deptex cross-file taint engine.
#
# jsrsasign exposes RSA / ECDSA / HMAC signature + encryption surfaces
# through `KJUR.crypto.Signature` and `KEYUTIL` / `RSAKey` classes. The
# AI-generated fixture in `bench-iterate/v_base/2026-05-12T17-41-24/
# report.json` for CVE-2024-21484 routes a tainted ciphertext into a
# decrypt call:
#
#   app.post('/decrypt', (req, res) => {
#     const key = KEYUTIL.getKey(privateKeyPem);
#     const ciphertext = req.body.ciphertext;
#     const plaintext = key.decrypt(ciphertext);
#     res.json({ plaintext });
#   });
#
# CVE-2024-21484 is a signature-validation bypass — the library's verify
# routine accepts crafted signatures that pass the check without
# corresponding to the supplied key. Both `*.verify*(*)` (signature side)
# and `*.decrypt(*)` (the AI's preferred fixture shape) are modelled as
# sinks: attacker-controlled bytes through either surface compromise the
# cryptographic guarantee.
#
# vuln_class mapping rationale.
#   `weak_crypto` was added to the enum in phase28c precisely for sinks
#   where tainted data influences a cryptographic primitive in a way that
#   breaks its security guarantees. CVE-2022-23541 (jsonwebtoken `kid`)
#   is cited in spec.ts as the canonical example — jsrsasign's
#   verify/decrypt family falls into the same bucket. `auth_bypass` would
#   be the alternative for the verify-specific case, but `weak_crypto`
#   captures both decrypt + verify uniformly.
#
# Sources NOT redeclared — Express/Fastify/NestJS request sources are
# pre-tainted by the per-framework specs; the AI fixture relies on
# express.yaml's `req.body.*`.

framework: jsrsasign
version: "*"
language: js

sources: []

sinks:
  # ---------- Weak crypto — signature verification family ----------
  # CVE-2024-21484 et al. — KJUR.crypto.Signature verify accepts crafted
  # signatures from attacker input. We target the jsrsasign-SPECIFIC verify
  # method names below rather than a bare `*.verify(*)` wildcard: that wildcard
  # matched ANY `.verify` callee — QStash `receiver.verify`, nodemailer
  # `transporter.verify`, node `crypto.verify`, passport strategy `verify`, etc.
  # — none of which are jsrsasign and all of which are signature-VERIFICATION
  # controls (the opposite of a sink). The named patterns keep recall on the
  # real jsrsasign surface without that cross-library false-positive blast.
  - pattern: "*.verifyHexSignatureForMessage(*)"
    vuln_class: weak_crypto
    argument_indices: []
    description: jsrsasign verifyHexSignatureForMessage — tainted signature material
  - pattern: "*.verifySignature(*)"
    vuln_class: weak_crypto
    argument_indices: []
    description: jsrsasign verifySignature — tainted signature material
  - pattern: "*.verifyJWT(*)"
    vuln_class: weak_crypto
    argument_indices: []
    description: jsrsasign KJUR.jws.JWS.verifyJWT — tainted JWT
  - pattern: "*.verifyJWS(*)"
    vuln_class: weak_crypto
    argument_indices: []
    description: jsrsasign KJUR.jws.JWS.verifyJWS — tainted JWS
  - pattern: "KJUR.jws.JWS.verify(*)"
    vuln_class: weak_crypto
    argument_indices: []
    description: jsrsasign KJUR.jws.JWS.verify — namespaced
  - pattern: "KJUR.jws.JWS.verifyJWT(*)"
    vuln_class: weak_crypto
    argument_indices: []
    description: jsrsasign KJUR.jws.JWS.verifyJWT — namespaced

  # ---------- Weak crypto — decrypt family ----------
  # jsrsasign RSAKey decrypt surface for CVE-2024-21484. A bare `*.decrypt(*)`
  # wildcard matched every `.decrypt` callee in any codebase (node `crypto`
  # decipher, libsodium, app-level helpers) — too broad. The OAEP/PKCS1 named
  # variants below are jsrsasign-specific; the generic decrypt entry is dropped.
  - pattern: "*.decryptOAEP(*)"
    vuln_class: weak_crypto
    argument_indices: []
    description: jsrsasign RSAKey.decryptOAEP — tainted ciphertext through OAEP
  - pattern: "*.decryptPKCS1(*)"
    vuln_class: weak_crypto
    argument_indices: []
    description: jsrsasign RSAKey.decryptPKCS1 — tainted ciphertext through PKCS1

sanitizers: []
