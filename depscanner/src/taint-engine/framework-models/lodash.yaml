# Lodash framework spec — Deptex cross-file taint engine.
#
# Lodash prototype-pollution sinks (_.merge, _.set, _.defaultsDeep, etc.)
# already live in node-stdlib.yaml. This spec adds lodash's template-
# compilation surface, which compiles a string into an executable function:
# any attacker control over the template body OR the `imports` option
# results in arbitrary code execution at render time.
#
# CVE-2026-4800 (and the historical CVE-2021-23337 of the same family)
# both turn on this surface — `_.template(userTemplate, { imports: ... })`
# inlines the imports keys into the generated function source.

framework: lodash
version: "*"
language: js

sources: []

sinks:
  # ---------- Code injection via _.template ----------
  # _.template compiles its argument (and the `imports` option) into an
  # executable function. CVE-2021-23337 and CVE-2026-4800 are the same
  # vulnerable surface, so we emit one sink row per CVE. The engine's sink
  # fan-out (matchSinkVariants in propagate-core.ts) emits ONE flow per CVE
  # at a shared call site, so a reachable `_.template` promotes EVERY one of
  # these CVEs dep-scan detected on the project to `confirmed` — not just the
  # first-listed. Each flow's osv_id is matched against the project's PDVs in
  # the reachability classifier.
  - pattern: _.template(*)
    vuln_class: code_injection
    argument_indices: [0, 1]
    osv_id: CVE-2021-23337
    description: lodash _.template — template string + imports option evaluated as code (CVE-2021-23337)
  - pattern: _.template(*)
    vuln_class: code_injection
    argument_indices: [0, 1]
    osv_id: CVE-2026-4800
    description: lodash _.template — template string + imports option evaluated as code (CVE-2026-4800)
  - pattern: lodash.template(*)
    vuln_class: code_injection
    argument_indices: [0, 1]
    osv_id: CVE-2021-23337
    description: lodash.template namespaced — same code-injection surface (CVE-2021-23337)
  - pattern: lodash.template(*)
    vuln_class: code_injection
    argument_indices: [0, 1]
    osv_id: CVE-2026-4800
    description: lodash.template namespaced — same code-injection surface (CVE-2026-4800)

sanitizers: []
