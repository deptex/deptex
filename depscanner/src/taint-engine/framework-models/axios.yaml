# axios framework spec ŌĆö Deptex cross-file taint engine.
#
# axios SSRF surfaces (`axios.get`, `axios.post`, `axios(*)`, etc.) are
# already declared in node-stdlib.yaml. This spec adds the `mergeConfig`
# call site, which is the canonical prototype-pollution sink shape the
# AI emits for the axios CVE family.
#
# CVE-2026-25639 (and adjacent axios config-merge issues) walk attacker-
# controlled data through the second argument of `axios.mergeConfig(target,
# source)`. When `source` carries a `__proto__` / `constructor.prototype`
# key, axios.mergeConfig copies it onto `Object.prototype`, poisoning the
# global. The Qwen fixture in `bench-iterate/v_base/2026-05-12T17-41-24/
# report.json` is:
#
#   module.exports = (req, res) => {
#     const maliciousConfig = JSON.parse(req.body.config);
#     const config = axios.mergeConfig({}, maliciousConfig);
#     res.json(config);
#   };
#
# This shape doesn't match the generic `*.merge(*)` pattern in
# node-stdlib.yaml (suffix is `.mergeConfig`, not `.merge`), so without an
# axios-specific entry the engine sees zero sink matches.
#
# vuln_class mapping ŌĆö `prototype_pollution` matches node-stdlib.yaml's
# `_.merge` / `_.set` / `Object.assign` cluster. argument_indices=[1] is
# the source argument (axios's mergeConfig signature is `(config1, config2)`
# where config2's keys clobber config1).

framework: axios
version: "*"
language: js

sources: []

sinks:
  # ---------- Prototype pollution via axios config merge ----------
  - pattern: axios.mergeConfig(*)
    vuln_class: prototype_pollution
    argument_indices: [1]
    description: axios.mergeConfig ŌĆö second-arg keys merge into first, attacker-controlled keys poison Object.prototype (CVE-2026-25639 family)
  # Bare `mergeConfig` covers destructured imports
  # (`const { mergeConfig } = require('axios')` and the internal
  # `axios/lib/core/mergeConfig` path which some packages re-export).
  - pattern: mergeConfig(*)
    vuln_class: prototype_pollution
    argument_indices: [1]
    description: bare mergeConfig ŌĆö destructured-import shape of axios.mergeConfig

  # ---------- Proxy SSRF (CVE-2025-62718) ----------
  # axios's internal `setProxy(req, proxy, location)` routes the outbound
  # request through an attacker-controllable proxy. The `proxy` arg (index 1)
  # and `location` arg (index 2) both become part of the connect URL; if
  # either is attacker-controlled the request exfiltrates to the proxy.
  # The AI fixture in the 2026-05-14 multi-trial passes shape:
  # `setProxy(req, userProxy, userLoc)` ŌĆö the bare-function shape covers
  # destructured / re-exported imports.
  - pattern: setProxy(*)
    vuln_class: ssrf
    argument_indices: [1, 2]
    description: axios internal setProxy ŌĆö proxy/location args route outbound request through attacker-supplied host (CVE-2025-62718)
  - pattern: axios.setProxy(*)
    vuln_class: ssrf
    argument_indices: [1, 2]
    description: axios.setProxy (qualified) ŌĆö same SSRF surface

  # ---------- axios.create config (CVE-2026-25639 family) ----------
  # axios.create(config) ŌĆö first-arg keys flow into the global defaults
  # chain, which `proxy`, `headers`, `transformRequest`, and friends
  # propagate from. Attacker-controlled config keys (especially
  # `__proto__` / `constructor.prototype`) poison the per-instance
  # defaults and downstream cross-instance state. Qwen fixtures
  # consistently emit this shape.
  #
  # NOTE: a bare wildcard-receiver `*.create(*)` and `*.set(*)` used to live
  # here (for destructured `create()` / `AxiosHeaders.set()` shapes). They
  # were removed: `*.set(*)` matched EVERY `.set()` call in a codebase ŌĆö
  # `Map.prototype.set`, `URLSearchParams.set`, every in-memory cache write ŌĆö
  # and produced ~39 SSRF false positives on a single real frontend scan, and
  # `*.create(*)` matches `Object.create`/any `.create()`. AxiosHeaders.set as
  # an SSRF surface is speculative and almost never appears as a literal
  # `AxiosHeaders.set(...)` call; the real axios SSRF (axios.get/post/request,
  # fetch, setProxy) is already covered above and in node-stdlib.yaml. A
  # wildcard receiver on a generic method name (`set`/`create`/`get`) is the
  # exact "broad sink" anti-pattern the broadness guard exists to reject.
  - pattern: axios.create(*)
    vuln_class: prototype_pollution
    argument_indices: [0]
    description: axios.create(config) ŌĆö first-arg keys flow into the per-instance defaults chain (CVE-2026-25639 family)

sanitizers: []
