    vuln_class: sql_injection
    argument_indices: [0]
    description: ActiveRecord/Sequel where with raw SQL string
  - pattern: "*.find_by_sql(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: ActiveRecord find_by_sql
  - pattern: "*.exists?(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: ActiveRecord exists? with raw SQL string
  - pattern: "*.order(*)"
