  - pattern: db.run(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: Sequel DB#run
  - pattern: DB.run(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: Sequel DB#run (qualified)
  - pattern: db[*]
    vuln_class: sql_injection
    argument_indices: [0]
