# Sinatra framework spec — Deptex cross-file taint engine.
#
# Sinatra exposes request data through `params`, `request`, `cookies`, and
# `env`. Sources cover those plus common request-object accessors. Sinks
# duplicate the Ruby stdlib set from rails.yaml so a workspace using only
# Sinatra still detects stdlib-targeting flows.

framework: sinatra
language: ruby
version: "*"

sources:
  # Sinatra params / request
  - pattern: params.*
    taint_kind: http_input
    description: Sinatra params accessor
  - pattern: params[*]
    taint_kind: http_input
    description: Sinatra params subscript
  - pattern: params
    taint_kind: http_input
    description: bare params reference
  - pattern: request.*
    taint_kind: http_input
    description: Sinatra request accessor
  - pattern: request.params.*
    taint_kind: http_input
    description: Sinatra request.params accessor
  - pattern: request.params
    taint_kind: http_input
    description: Sinatra request.params
  - pattern: request.body.read
    taint_kind: http_input
    description: Sinatra request.body.read
  - pattern: request.body
    taint_kind: http_input
    description: Sinatra request.body
  - pattern: request.GET.*
    taint_kind: http_input
    description: Sinatra request.GET (Rack)
  - pattern: request.POST.*
    taint_kind: http_input
    description: Sinatra request.POST (Rack)
  - pattern: request.headers.*
    taint_kind: http_input
    description: Sinatra request.headers
  - pattern: request.cookies.*
    taint_kind: http_input
    description: Sinatra request.cookies
  - pattern: request.url
    taint_kind: http_input
    description: Sinatra request.url
  - pattern: request.path
    taint_kind: http_input
    description: Sinatra request.path
  - pattern: request.path_info
    taint_kind: http_input
    description: Sinatra request.path_info
  - pattern: request.host
    taint_kind: http_input
    description: Sinatra request.host
  - pattern: request.referer
    taint_kind: http_input
    description: Sinatra request.referer
  - pattern: request.user_agent
    taint_kind: http_input
    description: Sinatra request.user_agent
  - pattern: env.*
    taint_kind: http_input
    description: Rack env accessor
  - pattern: env[*]
    taint_kind: http_input
    description: Rack env subscript
  - pattern: cookies.*
    taint_kind: http_input
    description: Sinatra cookies accessor
  - pattern: cookies[*]
    taint_kind: http_input
    description: Sinatra cookies subscript
  - pattern: session.*
    taint_kind: http_input
    description: Sinatra session accessor
  - pattern: session[*]
    taint_kind: http_input
    description: Sinatra session subscript

  # Call-shape sources
  - pattern: params.fetch(*)
    taint_kind: http_input
    description: params.fetch()
  - pattern: params.dig(*)
    taint_kind: http_input
    description: params.dig()
  - pattern: request.body.read(*)
    taint_kind: http_input
    description: request.body.read()

  # ---------- Rack middleware sources ----------
  # Many gem-ecosystem CVEs ship Rack-shaped fixtures: `class App; def
  # call(env); ... end; end`. The `env` Rack environment is the entry-point
  # input, but it arrives as a method parameter (not a property access) so
  # the property-style `env[*]` source above only fires when the handler
  # touches `env` directly. The call-shape sources below let taint enter
  # via Rack::Request#new and Rack::Utils.parse_query — the two idioms a
  # middleware uses to read request data without touching `env` itself.
  - pattern: Rack.Request.new(*)
    taint_kind: http_input
    description: Rack::Request.new(env) — wraps tainted Rack environment
  - pattern: Rack.Utils.parse_query(*)
    taint_kind: http_input
    description: Rack::Utils.parse_query — parses tainted query string
  - pattern: Rack.Utils.parse_nested_query(*)
    taint_kind: http_input
    description: Rack::Utils.parse_nested_query
  - pattern: Rack.Utils.parse_cookies(*)
    taint_kind: http_input
    description: Rack::Utils.parse_cookies
  - pattern: Rack.MediaType.params(*)
    taint_kind: http_input
    description: Rack::MediaType.params — parses tainted Content-Type
  - pattern: "*.get_header(*)"
    taint_kind: http_input
    description: Rack::Request#get_header
  - pattern: "*.fetch_header(*)"
    taint_kind: http_input
    description: Rack::Request#fetch_header
  - pattern: "*.get_header"
    taint_kind: http_input
    description: bare get_header reference

