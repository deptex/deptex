sanitizers:
  # ---------- SQL ----------
  - pattern: ActiveRecord.Base.sanitize_sql(*)
    vuln_classes: [sql_injection]
    description: ActiveRecord::Base.sanitize_sql
  - pattern: sanitize_sql(*)
    vuln_classes: [sql_injection]
    description: bare sanitize_sql
  - pattern: connection.quote(*)
    vuln_classes: [sql_injection]
    description: ActiveRecord connection.quote
  - pattern: db.literal(*)
    vuln_classes: [sql_injection]
    description: Sequel DB#literal

  # ---------- XSS ----------
  - pattern: ERB.Util.html_escape(*)
    vuln_classes: [xss]
    description: ERB::Util.html_escape
  - pattern: html_escape(*)
    vuln_classes: [xss]
    description: html_escape helper
  - pattern: h(*)
    vuln_classes: [xss]
    description: h() escape helper
  - pattern: CGI.escapeHTML(*)
    vuln_classes: [xss]
    description: CGI.escapeHTML
  - pattern: ERB.Util.h(*)
    vuln_classes: [xss]
    description: ERB::Util.h

  # ---------- Open redirect / SSRF ----------
  - pattern: CGI.escape(*)
    vuln_classes: [xss, open_redirect]
    description: CGI.escape
  - pattern: URI.encode_www_form_component(*)
    vuln_classes: [xss, open_redirect]
    description: URI.encode_www_form_component
  - pattern: URI.parse(*)
    vuln_classes: [ssrf]
    description: URI.parse — best-effort URL validation

  # ---------- Command injection ----------
  - pattern: Shellwords.escape(*)
    vuln_classes: [command_injection]
    description: Shellwords.escape
  - pattern: Shellwords.split(*)
    vuln_classes: [command_injection]
    description: Shellwords.split
  - pattern: shellescape(*)
    vuln_classes: [command_injection]
    description: String#shellescape (alias)

  # ---------- Path traversal ----------
  - pattern: File.basename(*)
    vuln_classes: [path_traversal]
    description: File.basename — strips directory
  - pattern: File.expand_path(*)
    vuln_classes: [path_traversal]
    description: File.expand_path with explicit base dir

  # ---------- Cross-class numeric coercion ----------
  - pattern: Integer(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: Integer() coercion
  - pattern: Float(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: Float() coercion
  - pattern: to_i
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: String#to_i
  - pattern: "*.to_i"
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: String#to_i (receiver form)

  # ---------- Deserialization ----------
  - pattern: YAML.safe_load(*)
    vuln_classes: [deserialization]
    description: YAML.safe_load
  - pattern: Psych.safe_load(*)
    vuln_classes: [deserialization]
    description: Psych.safe_load
  - pattern: JSON.parse(*)
    vuln_classes: [deserialization]
    description: JSON.parse — well-defined data-only deserializer

  # ---------- ReDoS ----------
  - pattern: Regexp.escape(*)
    vuln_classes: [redos]
    description: Regexp.escape
