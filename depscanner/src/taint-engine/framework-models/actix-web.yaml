  - pattern: sqlx::query(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: sqlx::query — raw SQL string
  - pattern: sqlx::query_as(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: sqlx::query_as — raw SQL string
  - pattern: sqlx::query_scalar(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: sqlx::query_scalar — raw SQL string
  - pattern: diesel::sql_query(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: diesel::sql_query — raw SQL string
  - pattern: tokio_postgres::Client.query(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: tokio-postgres Client.query
  - pattern: tokio_postgres::Client.execute(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: tokio-postgres Client.execute
  - pattern: "*.query(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Generic .query() — DB clients
  - pattern: "*.execute(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Generic .execute() — DB clients, prepared statements
  - pattern: "*.query_as(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Generic .query_as() — sqlx-style typed query
  - pattern: "*.fetch_all(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Generic .fetch_all() — sqlx executor entrypoint

  # ---------- Command injection ----------
  - pattern: std::process::Command::new(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: std::process::Command::new — program name
  - pattern: Command::new(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: Command::new — bare import
  - pattern: "*.arg(*)"
    vuln_class: command_injection
    argument_indices: [1]
    description: Command builder .arg(*) — first method arg is the appended argv element (engine IR puts receiver at args[0])
  - pattern: "*.args(*)"
    vuln_class: command_injection
    argument_indices: [1]
    description: Command builder .args(*) — first method arg is the appended argv slice
  - pattern: tokio::process::Command::new(*)
    vuln_class: command_injection
    argument_indices: [0]
    description: tokio::process::Command::new — async variant

