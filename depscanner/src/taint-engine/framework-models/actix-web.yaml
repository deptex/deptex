# Actix-web framework spec — Deptex cross-file taint engine.
#
# Actix-web exposes request data through extractors (`web::Query<T>`,
# `web::Json<T>`, `web::Path<T>`, `web::Form<T>`) and on `HttpRequest`
# (`headers()`, `cookie()`, `match_info()`, `query_string()`). Sources here
# match the call shape `web::Query.into_inner(*)` plus any property/method
# read off the extractor type that lifts taint into a local.
#
# v1 limitations:
#   - Synthesizing sources from parameter type annotations (e.g. a handler
#     `async fn list(q: web::Query<Params>)` should mark `q` tainted on
#     entry) is not implemented in M2 — the IR doesn't carry parameter
#     types. We rely on the .into_inner() / field-read patterns below to
#     catch most realistic flows. Handlers that write `params.cmd` directly
#     into a sink without an intermediate `into_inner()` may be missed.
#   - Trait-based extractors via `FromRequest` aren't enumerated; only the
#     built-in ones are listed.
#   - Generic resolution: `web::Json::<T>` matches the `web::Json` prefix
#     only.
#
# Sinks duplicate the Rust stdlib set so a workspace using only actix-web
# still detects flows into std::fs / std::process / sqlx / reqwest / etc.

framework: actix-web
language: rust
version: "*"

sources:
  # ---------- Extractor `.into_inner()` calls ----------
  - pattern: web::Query.into_inner(*)
    taint_kind: http_input
    description: actix-web Query<T>.into_inner()
  - pattern: web::Json.into_inner(*)
    taint_kind: http_input
    description: actix-web Json<T>.into_inner()
  - pattern: web::Path.into_inner(*)
    taint_kind: http_input
    description: actix-web Path<T>.into_inner()
  - pattern: web::Form.into_inner(*)
    taint_kind: http_input
    description: actix-web Form<T>.into_inner()
  - pattern: Query.into_inner(*)
    taint_kind: http_input
    description: bare Query<T>.into_inner()
  - pattern: Json.into_inner(*)
    taint_kind: http_input
    description: bare Json<T>.into_inner()
  - pattern: Path.into_inner(*)
    taint_kind: http_input
    description: bare Path<T>.into_inner()
  - pattern: Form.into_inner(*)
    taint_kind: http_input
    description: bare Form<T>.into_inner()
  # Wildcard receiver — the IR records the LOCAL variable name (e.g. `query`),
  # not the static type. Without typed-callgraph info we accept any receiver
  # calling .into_inner(); this catches the canonical Actix idiom at the cost
  # of a small FP rate when a non-extractor type also exposes into_inner.
  - pattern: "*.into_inner(*)"
    taint_kind: http_input
    description: any *.into_inner() — Actix extractor unwrap (wildcard receiver)

  # ---------- HttpRequest accessors (call shape) ----------
  - pattern: req.headers().get(*)
    taint_kind: http_input
    description: HttpRequest.headers().get()
  - pattern: req.cookie(*)
    taint_kind: http_input
    description: HttpRequest.cookie()
  - pattern: req.match_info().get(*)
    taint_kind: http_input
    description: HttpRequest.match_info().get()
  - pattern: req.query_string(*)
    taint_kind: http_input
    description: HttpRequest.query_string()
  - pattern: HttpRequest.headers(*)
    taint_kind: http_input
    description: HttpRequest.headers() (qualified)
  - pattern: HttpRequest.cookie(*)
    taint_kind: http_input
    description: HttpRequest.cookie() (qualified)
  - pattern: HttpRequest.query_string(*)
    taint_kind: http_input
    description: HttpRequest.query_string() (qualified)

  # ---------- HttpRequest field/method reads (no-arg) ----------
  - pattern: req.uri().path
    taint_kind: http_input
    description: HttpRequest.uri().path
  - pattern: req.uri().path()
    taint_kind: http_input
    description: HttpRequest.uri().path()
  - pattern: req.uri().query()
    taint_kind: http_input
    description: HttpRequest.uri().query()

  # ---------- Field-access on extractor params (when seen as text) ----------
  # Actix idiom: `async fn h(q: web::Query<Params>) { do(&q.name) }`. If a
  # call resolves to `q.name`, the source matcher won't fire because we
  # don't statically know `q` is tainted. The propagator handles the more
  # common `into_inner()` pattern; field-reads on params are documented v1
  # gaps.
  - pattern: params.*
    taint_kind: http_input
    description: "handler-param-field read (fallback for params: web::Query<T> shape)"

sinks:
