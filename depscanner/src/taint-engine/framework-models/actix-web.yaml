  - pattern: std::fs::File::create(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: std::fs::File::create
  - pattern: File::open(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: File::open — bare import
  - pattern: File::create(*)
    vuln_class: path_traversal
    argument_indices: [0]
    description: File::create — bare import
  - pattern: std::fs::read(*)
