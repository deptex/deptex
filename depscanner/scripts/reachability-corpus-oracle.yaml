# Independent reachability oracle for the corpus.
#
# WHY THIS FILE EXISTS:
#   reachability-corpus.yaml is hand-labelled by the same person shipping the
#   dependency-scope rule, so the classifier reproducing a manifest scope is
#   definitionally true and proves little. This file is a SECOND, independent
#   pass: each corpus CVE is judged purely on the production-call-path
#   question — "does this repo's shipped runtime code cause the vulnerable
#   code to execute?" — with NO reference to which manifest section declared
#   the dependency. It catches mis-scoped deps: a manifest-dev dependency that
#   is actually loaded by shipped code, or a manifest-prod dependency that is
#   dead.
#
# VERDICTS:
#   reachable   — shipped runtime code drives execution into the package.
#   module      — the package is loaded/used at runtime, but whether THIS
#                 advisory's vulnerable path is exercised is unverified.
#   unreachable — no production call path reaches the package; it is present
#                 only to serve build / test / lint / release tooling.
#
# GATE BEHAVIOUR (scripts/reachability-corpus.ts):
#   If the oracle says `reachable` and the scan observed `unreachable`, that is
#   an oracle-disagreement false negative and fails the run — the same severity
#   as a hand-label false negative. `module` verdicts never trigger the gate
#   (a module-labelled dep observed `unreachable` is an accepted
#   over-classification, not a safety failure).
#
# Authored 2026-05-19. NOTE: a single author wrote both this file and the
# corpus labels; genuine independence needs a second reviewer — flagged in the
# plan STATUS as a follow-up.

