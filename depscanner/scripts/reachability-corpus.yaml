  - name: koel
    repo_url: https://github.com/koel/koel.git
    ecosystem: composer
    # Jun 2022 — Koel v6.0.0. A SECOND real Laravel/composer app beside monica,
    # chosen deliberately for OPPOSITE characteristics (the second-app validation
    # the composer dev-scope + future Laravel always-on model require): monica is
    # a server-rendered Blade MVC CRM; Koel is an API-FIRST Laravel backend with a
    # Vue SPA client (no Blade views on the request path). Same laravel/framework 9
    # major, so it exercises the same always-on request-path CVEs on a different
    # app shape, and its own composer.lock packages-dev tests that the
    # framework-independent dev-only demotion generalizes past monica.
