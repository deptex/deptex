# Frozen pre-feature reachability labels — baseline lock.
#
# WHY THIS FILE EXISTS:
#   The dependency-scope noise-reduction feature (v2) and the Layer-3 corpus
#   expansion both edit reachability-corpus.yaml. This file pins every
#   `expected_reachability` label that existed *before* that work, so the
#   gate (scripts/reachability-corpus.ts) can prove no pre-existing label was
#   quietly changed to flatter the noise-reduction number. The honest-
#   decomposition claim (full-weight `unreachable` rate, reported next to the
#   module-weighted Gate-1 number) depends on these labels being stable —
#   an enforced lock, not a code comment.
#
# GATE BEHAVIOUR:
#   For every CVE listed here, the live reachability-corpus.yaml must still
#   carry it with the same `expected_reachability`. A changed label, or a
#   deleted CVE, fails the run (exit 1). CVEs added by the Layer-3 expansion
#   are intentionally NOT listed — the lock enforces only the frozen set, it
#   does not forbid growth.
#
# Frozen 2026-05-19 — the 31-CVE M4 corpus (express 4.18.2 / spring-petclinic
# @c7ee170 / bat v0.24.0), the baseline that entered Layer 3.

