# fly.toml app configuration for the depscanner Fly app.
# Originally `deptex-extraction-worker`; renamed to `deptex-depscanner` in
# Phase 23 to reflect that the worker now hosts multiple scanner types
# (extraction + DAST + future iac/container/malicious-pkg).
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'deptex-depscanner'
primary_region = 'ewr'

[build]

# VDB extract is ~30GB; we keep it between runs. Need headroom for cache/atom (~5–10GB). Do not clear /data, only /data/cache.
[mounts]
source = "depscan_vdb"
destination = "/data"
initial_size = "50gb"

[env]
  NODE_ENV = 'production'
  VDB_HOME = '/data'
  DEPSCAN_CACHE_DIR = '/data/cache'

[http_service]
  internal_port = 3000
  force_https = true
  # Worker exits after 60s idle (see depscanner/src/index.ts); we rely on that for
  # scale-to-zero. Fly must not stop the machine based on HTTP traffic (we have none).
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'performance'
  cpus = 8
  memory_mb = 65536
