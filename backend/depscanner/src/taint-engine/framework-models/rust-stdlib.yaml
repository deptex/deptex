sanitizers:
  # ---------- SQL injection ----------
  - pattern: "*.bind(*)"
    vuln_classes: [sql_injection]
    description: sqlx/diesel .bind() — parameterized binding makes the value safe vs raw SQL interpolation
  - pattern: "*.bind_all(*)"
    vuln_classes: [sql_injection]
    description: sqlx .bind_all() — bulk parameterized binding

  # ---------- XSS ----------
  - pattern: html_escape::encode_text(*)
    vuln_classes: [xss]
    description: html-escape encode_text
  - pattern: html_escape::encode_safe(*)
    vuln_classes: [xss]
    description: html-escape encode_safe
  - pattern: htmlescape::encode_minimal(*)
    vuln_classes: [xss]
    description: htmlescape encode_minimal
  - pattern: htmlescape::encode_attribute(*)
    vuln_classes: [xss]
    description: htmlescape encode_attribute
  - pattern: ammonia::clean(*)
    vuln_classes: [xss]
    description: ammonia::clean — HTML sanitizer

  # ---------- Path traversal ----------
  - pattern: std::path::Path::file_name(*)
    vuln_classes: [path_traversal]
    description: Path.file_name — strips directory components
  - pattern: "*.file_name(*)"
    vuln_classes: [path_traversal]
    description: Path-like .file_name()
  - pattern: Path::new(*)
    vuln_classes: []
    description: Path::new — not a sanitizer; included as no-op for clarity

  # ---------- Command injection ----------
  - pattern: shell_escape::escape(*)
    vuln_classes: [command_injection]
    description: shell-escape::escape — shell-quote for sh
  - pattern: shell_escape::unix::escape(*)
    vuln_classes: [command_injection]
    description: shell-escape::unix::escape

  # ---------- SSRF / open redirect ----------
  - pattern: urlencoding::encode(*)
    vuln_classes: [open_redirect, ssrf]
    description: urlencoding::encode — best-effort, doesn't actually validate host
  - pattern: percent_encoding::utf8_percent_encode(*)
    vuln_classes: [open_redirect, ssrf]
    description: percent-encoding utf8_percent_encode

  # ---------- ReDoS ----------
  - pattern: regex::escape(*)
    vuln_classes: [redos]
    description: regex::escape — escape regex metachars

  # ---------- Cross-class numeric coercion ----------
  # In Rust idiom: `s.parse::<i32>()` / `s.parse::<u64>()` — the IR lowerer
  # emits these as `*.parse(*)` (turbofish stripped).
  - pattern: "*.parse(*)"
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: str.parse::<T>() — numeric/typed coercion
  - pattern: i32::from_str(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: i32::from_str
  - pattern: u64::from_str(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: u64::from_str
  - pattern: usize::from_str(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: usize::from_str

  # ---------- Log injection ----------
  - pattern: strip_newlines(*)
    vuln_classes: [log_injection]
    description: hand-written newline stripper
