# Cross-framework Rust stdlib + common-crate sinks + sanitizers — applied
# alongside per-framework Rust specs (actix-web / axum).
#
# Convention: NO sources here. Sources are framework-specific (extractor
# wrappers like `web::Query`, `Json`, `Path`, headers/cookies); this file
# declares only sinks + sanitizers covering SQLi, command injection, path
# traversal, SSRF, deserialization, log injection, ReDoS.
#
# v1 limitations:
#   - No trait dispatch (we don't know which `Query` impl is in play; the
#     wildcard `*.arg(*)`-style patterns approximate this).
#   - No generic resolution (`sqlx::query::<_>(*)` matches the `sqlx::query`
#     prefix only).
#   - No macro expansion; macros are matched by `name!` text shape via the
#     IR lowerer (`format!`, `println!`, `vec!`, etc.).
#   - Lifetimes / borrows / `&` / `*` / `mut` are ignored at the IR level.

framework: rust-stdlib
language: rust
version: "*"

sources: []

sinks:
