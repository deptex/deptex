# fly.toml app configuration file generated for deptex-extraction-worker on 2026-03-01T13:41:19-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'deptex-extraction-worker'
primary_region = 'iad'

[build]

[mounts]
source = "depscan_vdb"
destination = "/data"
initial_size = "10gb"

[env]
  NODE_ENV = 'production'
  VDB_HOME = '/data'
  DEPSCAN_CACHE_DIR = '/data/cache'

[http_service]
  internal_port = 3000
  force_https = true
  # Worker exits after 60s idle (see extraction-worker/src/index.ts); we rely on that for
  # scale-to-zero. Fly must not stop the machine based on HTTP traffic (we have none).
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'performance'
  cpus = 8
  memory_mb = 65536
