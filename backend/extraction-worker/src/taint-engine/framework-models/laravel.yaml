sanitizers:
  # ---------- XSS ----------
  - pattern: htmlspecialchars(*)
    vuln_classes: [xss]
    description: PHP htmlspecialchars()
  - pattern: htmlentities(*)
    vuln_classes: [xss]
    description: PHP htmlentities()
  - pattern: strip_tags(*)
    vuln_classes: [xss]
    description: PHP strip_tags()
  - pattern: e(*)
    vuln_classes: [xss]
    description: Laravel e() helper (htmlspecialchars wrapper)

  # ---------- SQL ----------
  - pattern: mysqli_real_escape_string(*)
    vuln_classes: [sql_injection]
    description: PHP mysqli_real_escape_string()
  - pattern: addslashes(*)
    vuln_classes: [sql_injection]
    description: PHP addslashes() — best-effort
  - pattern: PDO::quote(*)
    vuln_classes: [sql_injection]
    description: PDO::quote()
  - pattern: "*->quote(*)"
    vuln_classes: [sql_injection]
    description: PDO->quote()

  # ---------- Command injection ----------
  - pattern: escapeshellcmd(*)
    vuln_classes: [command_injection]
    description: PHP escapeshellcmd()
  - pattern: escapeshellarg(*)
    vuln_classes: [command_injection]
    description: PHP escapeshellarg()

  # ---------- Path traversal ----------
  - pattern: basename(*)
    vuln_classes: [path_traversal]
    description: PHP basename()
  - pattern: realpath(*)
    vuln_classes: [path_traversal]
    description: PHP realpath()
  - pattern: pathinfo(*)
    vuln_classes: [path_traversal]
    description: PHP pathinfo()

  # ---------- SSRF / open redirect ----------
  - pattern: filter_var(*)
    vuln_classes: [xss, ssrf, open_redirect]
    description: PHP filter_var() — best-effort URL/email validation
  - pattern: parse_url(*)
    vuln_classes: [ssrf, open_redirect]
    description: PHP parse_url() — used for host allowlisting
  - pattern: URL::isValidUrl(*)
    vuln_classes: [ssrf, open_redirect]
    description: Laravel URL::isValidUrl()

  # ---------- Numeric coercion (cross-class) ----------
  - pattern: intval(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: PHP intval()
  - pattern: floatval(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: PHP floatval()
  - pattern: doubleval(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: PHP doubleval() (alias)
  - pattern: settype(*)
    vuln_classes: [sql_injection, command_injection, path_traversal]
    description: PHP settype()

  # ---------- ReDoS ----------
  - pattern: preg_quote(*)
    vuln_classes: [redos]
    description: PHP preg_quote()
