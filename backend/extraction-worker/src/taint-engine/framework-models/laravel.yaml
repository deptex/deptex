    argument_indices: [0]
    description: Laravel DB::raw()
  - pattern: DB::select(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: Laravel DB::select() with raw SQL
  - pattern: DB::statement(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: Laravel DB::statement()
  - pattern: DB::unprepared(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: Laravel DB::unprepared()
  - pattern: DB::insert(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: Laravel DB::insert() with raw SQL
  - pattern: DB::update(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: Laravel DB::update() with raw SQL
  - pattern: DB::delete(*)
    vuln_class: sql_injection
    argument_indices: [0]
    description: Laravel DB::delete() with raw SQL
  - pattern: "*->whereRaw(*)"
