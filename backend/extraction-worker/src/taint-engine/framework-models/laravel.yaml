  # file_get_contents is dual-classed: when given a URL it's SSRF.
  - pattern: file_get_contents(*)
    vuln_class: ssrf
    argument_indices: [0]
    description: PHP file_get_contents() — URL stream wrapper

  # ---------- XSS ----------
  - pattern: echo(*)
    vuln_class: xss
    argument_indices: []
    description: echo statement (synthetic) — any tainted arg is XSS
  - pattern: print(*)
    vuln_class: xss
    argument_indices: []
    description: print statement (synthetic)
  - pattern: Blade::raw(*)
    vuln_class: xss
    argument_indices: [0]
    description: Laravel Blade::raw() — emits unescaped HTML
  - pattern: "*->withErrors(*)"
    vuln_class: xss
