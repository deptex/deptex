# Laravel framework spec — Deptex cross-file taint engine.
#
# Laravel exposes request data through the `$request` instance (typically an
# Illuminate\Http\Request injected into controller actions) and the static
# Request / Input facades. Sources cover input(), all(), query(), get(),
# post(), cookie(), header(), json(), file(). Sinks cover SQL injection
# (DB::raw, *->whereRaw, raw DB::select/statement), command injection
# (exec/system/shell_exec/passthru/proc_open/popen/pcntl_exec), path
# traversal (fopen, file_get_contents, file_put_contents, readfile,
# Storage::get/download), SSRF (curl_init/Http::get/Http::post,
# file_get_contents on URLs), XSS (echo + Blade::raw), open redirect
# (redirect, header()), deserialization (unserialize, eval, assert,
# create_function), log injection (Log::*, error_log), redos (preg_*).
#
# Generic PHP-stdlib sinks are duplicated across the laravel + symfony yamls
# so a workspace using only one of them still detects stdlib-targeting flows.

framework: laravel
language: php
version: "*"

sources:
  # Member-call shape: $request->method(*)
  - pattern: request->input(*)
    taint_kind: http_input
    description: Laravel $request->input()
  - pattern: request->all(*)
    taint_kind: http_input
    description: Laravel $request->all()
  - pattern: request->all.*
    taint_kind: http_input
    description: Laravel $request->all()['k']
  - pattern: request->query(*)
    taint_kind: http_input
    description: Laravel $request->query()
  - pattern: request->get(*)
    taint_kind: http_input
    description: Laravel $request->get()
  - pattern: request->post(*)
    taint_kind: http_input
    description: Laravel $request->post()
  - pattern: request->cookie(*)
    taint_kind: http_input
    description: Laravel $request->cookie()
  - pattern: request->header(*)
    taint_kind: http_input
    description: Laravel $request->header()
  - pattern: request->json(*)
    taint_kind: http_input
    description: Laravel $request->json()
  - pattern: request->file(*)
    taint_kind: http_input
    description: Laravel $request->file()
  - pattern: request->only(*)
    taint_kind: http_input
    description: Laravel $request->only()
  - pattern: request->except(*)
    taint_kind: http_input
    description: Laravel $request->except()
  - pattern: request->bearerToken(*)
    taint_kind: http_input
    description: Laravel $request->bearerToken()
  - pattern: request->fullUrl(*)
    taint_kind: http_input
    description: Laravel $request->fullUrl()

  # Property access: $request->prop / $request->prop['k']
  - pattern: request->input.*
    taint_kind: http_input
    description: Laravel $request->input attribute
  - pattern: request->query.*
    taint_kind: http_input
    description: Laravel $request->query attribute
  - pattern: request->cookies.*
    taint_kind: http_input
    description: Laravel $request->cookies attribute
  - pattern: request->headers.*
    taint_kind: http_input
    description: Laravel $request->headers attribute

  # Static facades: Input::*, Request::*
  - pattern: Input::get(*)
    taint_kind: http_input
    description: Laravel Input::get
  - pattern: Input::all(*)
    taint_kind: http_input
    description: Laravel Input::all
  - pattern: Input::only(*)
    taint_kind: http_input
    description: Laravel Input::only
  - pattern: Input::except(*)
    taint_kind: http_input
    description: Laravel Input::except
  - pattern: Input::has(*)
    taint_kind: http_input
    description: Laravel Input::has
  - pattern: Request::input(*)
    taint_kind: http_input
    description: Laravel Request::input
  - pattern: Request::all(*)
    taint_kind: http_input
    description: Laravel Request::all
  - pattern: Request::query(*)
    taint_kind: http_input
    description: Laravel Request::query
  - pattern: Request::get(*)
    taint_kind: http_input
    description: Laravel Request::get
  - pattern: Request::post(*)
    taint_kind: http_input
    description: Laravel Request::post
  - pattern: Request::cookie(*)
    taint_kind: http_input
    description: Laravel Request::cookie
  - pattern: Request::header(*)
    taint_kind: http_input
    description: Laravel Request::header
  - pattern: Request::file(*)
    taint_kind: http_input
    description: Laravel Request::file

  # PHP superglobals (raw)
  - pattern: _GET.*
    taint_kind: http_input
    description: PHP $_GET superglobal
  - pattern: _POST.*
    taint_kind: http_input
    description: PHP $_POST superglobal
  - pattern: _REQUEST.*
    taint_kind: http_input
    description: PHP $_REQUEST superglobal
  - pattern: _COOKIE.*
    taint_kind: http_input
    description: PHP $_COOKIE superglobal
  - pattern: _SERVER.*
    taint_kind: http_input
    description: PHP $_SERVER superglobal
  - pattern: _FILES.*
    taint_kind: http_input
    description: PHP $_FILES superglobal

