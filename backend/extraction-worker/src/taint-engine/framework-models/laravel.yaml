  - pattern: "*->havingRaw(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Eloquent Builder ->havingRaw()
  - pattern: "*->groupByRaw(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Eloquent Builder ->groupByRaw()
  - pattern: "*->raw(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Generic raw() helper
  - pattern: mysqli_query(*)
    vuln_class: sql_injection
    argument_indices: [1]
    description: mysqli_query()
  - pattern: mysql_query(*)
    vuln_class: sql_injection
