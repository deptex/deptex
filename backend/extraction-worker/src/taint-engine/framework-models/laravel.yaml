    argument_indices: [0]
    description: Eloquent Builder ->whereRaw()
  - pattern: "*->orWhereRaw(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Eloquent Builder ->orWhereRaw()
  - pattern: "*->orderByRaw(*)"
    vuln_class: sql_injection
    argument_indices: [0]
    description: Eloquent Builder ->orderByRaw()
  - pattern: "*->selectRaw(*)"
